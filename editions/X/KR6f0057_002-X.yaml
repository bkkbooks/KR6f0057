body:
  text: 下次解釋四智不究於中有二一明二乘不得四智第二若智一切苦下明如來得曰是中為明羅漢辟支有怖正應說彼二不得何須宣說如來得乎釋還兩第一舉彼為形二乘顯其不得二欲㯹示二乘所入是以須論前涅槃中先明佛得後明羅漢辟支不得今此先明二乘不得後明佛得文之左右就明二乘不得之中先明不得羅漢辟支後身菩薩為无明地之所覆下明其不得四智所以以其不成一切德故前涅槃中先明二乘不得所以後明不得今四智中先鄣不得後明二乘不得所以此亦是具文之左右前不得中有捴有別初有餘不了義說是其捴也餘是具也捴中先牒如來昔言下奪之前中言者如來昔言羅漢辟支是得智人觀察解脫四智究竟是四智相无學聖智是其解脫解脫即是四智正躰羅漢辟支出觀有中觀彼解脫生其四智究竟之想名觀解脫四智究竟此究竟時名蘓息處離分段死故名為蘓六道之中不復往來之為息下正辨之亦是如來方便有餘不了說者同前涅槃故言亦是權言導得曰方便實有不得名為有餘不了義說就下別中初何以故徵前起後如來昔時說為畢竟我今何故說為方便有餘不了有二死下對問弁釋於中先明我生已盡是其方便得有餘下就梵行立明其方便凡夫人下就所作辨明其方便所斷煩惚更不能下就不受後明其方便有餘不了我生盡中先明二死然後就之彰昔方便明二死中先舉二數亦有二生且云死耳次別兩名先問後列二種義廣死如別章此應具論今且釋名分段死者六道果報三世分異名為分段盡壞名死故言不思議變易死者汎釋有三一微細生滅前變後易名為變易變易是死名變易死故地持中生滅壞苦名變易苦此之一義該通凡聖二緣照无漏所得法身神化自在能變能易故云變易性是死法名變易死此之一義聖有凡无三真證法身隱顯自在名為變易變易非死但此變易猶為无常死法所隨就彼變易法身之上以論生死名變易死此之一義大有小无今此所論據第二門以說聖人无漏法身為生死故名不思議下就人弁分段牒初謂虛偽下就人定之小乘法中凡夫學人大乘法中外凡善趣此等皆於三界地中妄愛受生故名虛偽虛偽眾生所受生死名分段死變易牒後謂羅漢等就人弁定羅漢辟支相別可知誰是大力所謂種性解行菩薩彼有何義二輪煩惚全未斷除而不為彼煩惚所牽又於三界受生自在故名大力問曰涅槃宣說地前以為凡夫具煩惚性何緣得與羅漢辟支齊為變易釋言彼於六道生死雖分斷除无偏盡處故說為凡五住惑中未有盡處名具煩惚若望二乘彼是大聖二鄣清淨變易何疑問曰法華優波提舍宣說地前為分段生此經云何言是變易釋言地前有五種身一法性身謂性種性及解行中清淨向等二實報身謂習種性及解行中得前方便三應化身依前二種現化隨物四是生滅變易法身所謂緣照无漏業果五分段身謂无始來有漏業果五中前三非生死法後二生死彼法華論據第五門說為分段此就第四言是變易不相乖背意生身者是初地上一切菩薩彼人受生无㝵自在如心如意名意生身意有何義彼如意乎意有三義一速疾義二遍到義三无㝵義地上菩薩受生如是乃至究竟无上菩提彰其分齊上立二死下就此二明其方便二種死中以二乘人斷分段故如來說其我生已盡故是方便下次就其梵行已立以明方便梵行已立是證滅智滅有有餘无餘之別分段盡處名曰有餘滅變易盡處說為无餘二乘但得分段盡處名有餘證如來就此說梵行立故是方便下次就其所作已辦明其方便所作已辦是脩道智道有二種一分段對治二變易對治二乘始脩分段對治如來就此說其作辦故是方便文中兩句第一對人彰昔方便第二對鄣顯昔方便凡夫不辦七學未作是對人也凡夫於彼无學聖道未能成辦羅漢辟支刑對彼人名為已辦不望大乘故是方便七學於彼无學聖道未能脩作羅漢辟支刑對彼人名為所作不望大乘故是方便二乘因中三果四向名七學人據果返望說彼為先彼先未作今已作未釋言現今七種學人猶故未作无學所作若言現今羅漢辟支本為學人先未作者今時已作今作竟故名无學問曰凡夫及七學人於无學果皆不能作並不能辦何故偏言凡夫不辦七學未作隱顯故爾等是隱顯何故不說凡夫未作七學不辦釋言但說凡夫不辦明知未作若說七學所不辦者謂其能作无學所作為遮此疑是故不說七學不辦謂虛偽下是第二句對鄣顯也一切煩惚无非虛偽於中別分受生妄愛虛妄中極偏名虛偽如來以其所脩聖道能斷如是虛偽煩惚故說作辦不望无明故是方便下次就其不受後有以明方便有餘不了不受後有是斷集智集有二種一分段因二變易因羅漢辟支斷分段因餘因未斷如來偏就斷分段因說不受後故是方便文中初言所斷煩惚更不受後名不受後鄣昔方便非盡已下明今有餘不了之義以此類前齊應具明方便有餘但前略故宜彰方便不說有餘不了之義明方便中羅漢辟支所斷煩惚更不受者所斷四住畢竟永滅更不受後分段身也如來就此是故說其得不受後下明有餘不了義中先開二門後廣釋之言二門者非盡煩惚是第一門不斷集躰非盡受生是第二門不斷集能下廣釋中何故問也羅漢辟支二輪惑亡三界生盡今何故言非盡煩惚非盡受生有煩惚下對問釋弁先明非盡一切煩惚又如取下廣明盡非一切受生前明非盡一切惚中言有煩惚羅漢辟支所不斷者略明非盡一切煩惚有二種下廣明非盡一切煩惚於中先明一切煩惚羅漢辟支所不斷下彰其不盡前中應先解五住義然後釋文五住之義廣如別章文中有三一別明四住二心不相應无始已下別彰无明三此四力下四住无明相對弁異前四住中地之與起相對分別煩惚有二捴以㯹舉次列兩名先徵後列言住地者是四住躰言及起者四住所起是二云何汎釋有四一性事分別彼事識中取性煩惚名為性惑說之為地餘見受等緣境別生說為事惑通名為起彼取性者馬鳴論中名執取相亦名執相應染餘見愛等馬鳴論中名計名字相尋名計我及生諸結名計名字二本末分別於前事中十使為地餘纏垢等以之為起三成起分別一切煩惚宿習性成同名為地對緣現生斯名為起四前後分別一切煩惚前能生後通名為地後起依前同名為起下釋其相先解地躰住地有四牒以舉數次列其名先問後列見一處者五利煩惚推求名見入見道時一處併斷名見一處言住地者本為未依名之為住本能生末目之為地欲愛地者欲界地中一切煩惚除无明見說為欲愛以此界中着外五欲故名欲愛理實欲界亦愛自身着欲情多故偏言之又蕳上界所愛色身偏說欲愛住地同前色愛地者色界地中一切煩惚除无明見說為色愛以此界中捨外五欲着己色身故名色愛理實色界亦愛己心以此界中着色情多偏說色愛又蕳无色愛著心故偏說色愛住地同前有愛地者无色界中一切煩惚除无明見說為有愛此若背下應當說之為无色愛若隨所取應名心愛今為破患故名有愛破何等患外道多取无色界中以為涅槃絕離心愛今為破之故說有耳住地同前此四住下解釋地義能生起惑故名為地上來解地下次明起起者牒前言剎那心剎那相應弁釋其相剎那胡語此憣名念麁起煩惚作念現起名剎那心作念起惑是心法中諸煩惚數與心別躰共心相應故曰相應如想受等共心相應故馬鳴言心異念異同知同緣名相應染彼名愛結以為念矣上來第一別明四住自下第二別彰无明初言心不相應无始蕳別其相心不相應蕳異向前剎那相應餘起煩惚與心別躰共心相應此无明地即指七識妄想心躰以為无明不別心外有數法共心相應是故說為心不相應故馬鳴言即心无覺常无別異名不相應問曰前說四住所起是心相應今言无明心不相應四住恒沙竟復如何釋言恒沙有二分別一蕳末異本對无明地恒沙之惑唯心相應故下文言於此起煩惚剎那相應二隨義細分有是相應有非相應是義云何如馬鳴說第七識中義別六重一无明地二是業識不相應染三是轉不相應染四是現識不相染應五是智識心相應染六不斷識心相應染六中初一是无明地後五恒沙五中前三是不相應後二相應故恒沙惑義有兩兼四住地中亦有兩義一蕳末異本唯心相應此云何知四住在於事識之中如馬鳴說事識中惑一向名為心相應染明是相應又恒沙惑尚心相應四住何疑二隨義細分有是相應有非相應現行之者與心相應性成之者心不相應故雜心中一論師說使是相應一論師說是不相應有四住中別躰起者是心相應與无明地同躰義分是不相應无始蕳剎那心也此无明地久來性成不同起惑作念現生故曰无始无明住地列其名字愚闇之心躰无惠明故曰无明為彼恒沙起惑所依名之為住能生恒沙目之為地上來第二別彰无明自下第三四住无以下闕約之以弁真歸若有眾生是其種以下半行闕蒙佛化益得法津澤生信樂者得法潤益地前未證故說信樂歸依法僧是二歸者約人弁歸向前眾生歸依地上法之與僧此法與僧是真二歸下次明其一躰三歸亦名同躰三寶皆用實性為舶故名同躰故涅槃云若能觀三寶常住同真諦是實性中无三差別故名一躰於中初言非此二歸是歸如來蕳別同異歸第一下彰同異別於中初言歸第一義是歸如來略以㯹舉此言不足若具應言歸依法僧第一義諦是歸如來第一義諦事別則非理同故此是二歸依第一義下略以釋之法僧實性與佛不殊故歸法僧第一義諦是其究竟歸依如來歸佛實性名為究竟何以故下問答廣釋故何問也三歸各別何故歸依法僧義者得名究竟歸依如來无異下釋无異如來法僧實性不異佛性无異二歸如來實性不異法僧如來即三結成无異蕑去相似是以言即此言稍若略具應言如來實性即三歸性如來正可即餘二歸何故即三就佛躰實義分以為三歸性故從上羅漢有歸怖來大段第二會彼小果以入一乘自下第三釋會所以何故問也三乘皆是如來所說何故上來會二入一下釋會意明一乘道是佛實說餘二方便方便不實故會入一於中初明一乘是實若如來下明二是權即是大下會權入實明一實中說一乘道如來无畏師子說者當實而說內心不怯故言无畏言中決定名師子吼明二權中若隨彼欲而方便者佛隨小欲方便為說二乘法也下會入中即大无二攝權入實二乘入一釋无所以以二入一是故言无一乘即是第一義乘弁定所入所入是其第一義乘不同權大乘依理成是故名為第一義乘上來五章明一乘行自下八章明一乘理理者所謂如來藏性於中前三指示藏躰後之五章解釋藏義就前三中初明聖諦諦是藏詮故先明之第二說藏藏是諦實是以次弁三明法身顯前藏躰云何顯藏藏理在隱法身出相在隱難明出相易顯故舉出纏離相法身顯示在隱難識之藏故下文言如是法身不離煩惚名如來藏後五章中空義隱覆解釋能藏以有空義隱覆真實故名為藏一諦一依解釋所藏一諦藏躰一依藏用躰實平等名為一諦用具染淨染淨所依故云一依顛倒真實釋前空義有之所以藏躰清淨何緣得有空義隱覆故下釋之以其顛倒真實故有自性清淨轉釋向前一諦一依前說一諦躰性清淨上說一依從緣有染躰若清淨不應有染若從緣染躰應不淨故下釋之心與煩惚不相故躰性常淨而為客塵煩惚染故所以成染不染而染義在難知仰推如來如來述讚前三章中兩憣弁釋初先略弁於說藏身不思佛境及方便下拂權顯實指彰法躰就初憣中先明聖諦從聖諦者說深義下明如來藏若於无量煩惚藏下弁明法身就初章中四句釋之一解章名此章名為无邊聖諦苦集滅道審實名諦聖謂諸佛就聖弁諦故云聖諦諦有有量无量差別有量局限名為有邊无量寬廣故曰无邊二釋來意何故須弁釋言一乘依於知苦斷集證滅脩道以成故明四諦又復一乘依藏以成諦是藏詮故須明諦三解勝鬘不承不告自說所以前攝受章承力宣說前一乘章佛告令說自下八章何故不爾釋言向前一乘章初佛告令說諸佛所說攝受正法上來一乘是佛攝受下是正法前巳通告故下文中望直自說四釋其文於中應先解四諦義然後釋文義如別章文中有二一明聖智二聖義下約智以弁聖之與諦問曰何不直明聖諦先說智乎要有智者方名為聖智所智者方是諦故就明智中據人以分明如來智及二乘智是中為欲約如來智明无邊諦何須說彼二乘智乎釋言舉小為顯大故又欲蕑小而取大故文有八句四對差別初二一對約諦分別次二一對約理分別次二一對對鄣分別後二一對望果分別就初對中先明二乘觀諦之智初而非上後明佛智上而非初明二乘中聲聞緣覺初觀聖諦捴以㯹舉對後如來无作諦觀說彼為初問曰緣覺觀十二因緣今此何故說之觀諦釋言緣覺所觀因緣是苦集收故名觀諦又復緣覺就十二緣作具四十四智之觀彼亦是其四諦觀故說為觀諦四十四者十二因緣次第相生有十一對一一諦中各觀四諦名四十四以一智下顯其初相句別有三初言一智斷諸地者明二乘人單用初一有作諦智斷四住地不用无作斷无明地故名初觀二一智四下明二乘人單就初一有作智中開分四智不就无作故名初觀一有作中開分四智名一智四斷下列之斷者斷集知者知苦功德脩道作證證滅餘經論中先果後因今依順觀先因後果三亦善下明二乘人單用初一有作諦智別知四諦不用无作捴觀諦理故名初觀前以一智自斷己集乃至自證己家之滅并以此智知四真諦是故言亦別知非捴故說善知四法義矣明佛智中初言无有出世上智四智漸至四緣漸至明上无漸此文是倒若正應言出世上智无有四智漸至及四緣漸至既知如此置无在先長成句言勢亦遠所謂无有出世上智四智漸至及四緣漸耶菩薩智惠是出世上佛智過彼名上上智如來頓觀四諦法如以頓觀故能觀无有四智漸至所觀亦无四緣漸至无漸至下明无漸智方得是上捴觀深故第二對中乘言便故先明佛智是第一義却明二乘非第一義明佛智中金剛喻者是第一義舉用顯躰如世金剛能破諸物佛智如是能摧眾結如世金剛名金剛喻如此喻者能滅无明見第一義是故得名第一義智明二乘中非聲聞緣覺不斷无明初聖諦智是第一者此文是倒若正應言聲聞緣覺不斷无明初聖諦智非第一義智既知如此置非在前長成句言勢亦遠二乘初觀不滅无明无明覆心不能見理是故非是第一義智第三對中乘言便故先明二乘斷鄣不窮後明佛盡明二乘中以无二智斷諸地者二乘但以一有作智斷四住地不得第二无作智故不滅无明明佛盡中如來等覺舉能斷人非聲聞下明能斷智就此智中言非聲聞緣覺境界對劣顯勝不思空智正弁智躰斷一切下明能盡鄣五住皆滅名斷一切第四對中乘前便故先明如來果德究竟後明二乘果德不究明佛智中壞一切惚牒起前後究竟智者正弁其相是名第一約境以結明二乘中初聖諦智牒二乘智非究竟者正弁其相向菩提者顯不究義上明聖智自下約智明聖明諦於中有二一明聖及諦不在二乘二此諦下明聖及諦唯在如來前中先明聖非二乘後明聖諦非二乘諦復就前中言聖義者捴以㯹舉此舉窮極大聖義也言非一切聲聞緣覺就實論非究竟大聖不在二乘是故言非言聲聞緣覺成就有量少分功德為名聖者就權彰是此言即是釋防外難若彼非聖如來何故昔言是聖故今釋之以其成就有量少德故名為聖但言成就有量少德名之為聖即知非是大聖義矣有量淺也少分狹也諦非二中言聖諦者无作諦也言非聲聞緣覺諦者境非彼法亦非聲聞緣覺德者能觀之智非彼德也下就佛中准前應先明聖是佛却明聖諦是如來諦今此文中略无初句但明諦是如來諦矣句別有三初言此諦如來始覺明无作諦是佛所證噵佛初覺即顯二乘本未覺也二為无明下明无作諦是佛所說此顯不同有作諦矣云何不同㲉藏有二一是四住二是无明四住煩惚覆鄣眾生如鳥卵㲉名四住㲉藏无明覆鄣如鳥卵㲉名无明㲉藏所覆眾生名為世間有作四諦如來為彼四住㲉藏世間演說无作四諦如來為彼无明㲉藏世間演說噵為无明㲉藏演說即顯不同有作諦耳三是故下結良以此諦是佛大聖所覺所說故名聖諦自下第二明如來藏三句釋之一解章名此章名為如來藏章真識之中備唅法界恒沙佛法故名為藏又為妄隱亦名為藏如來法身在此藏中名如來藏又此藏中出生如來是故亦名如來藏矣二釋來意何故須弁乘依藏成是以論之三分文釋此章有二一就諦明藏二如來藏處說聖諦下就藏明諦問曰是中為欲明藏直爾就諦說藏便足何須就藏以說諦乎釋言此諦不依藏說今即不可就之說藏依藏說故得就說藏為成向前就諦說藏故須論之前中有四初言聖諦說深義者就諦明藏藏出情分是故言深二微細下顯其深相於中初明難知故深一切世下難信故深前難知中言微細者非聞惠境言難知者非思惠境非思量者非是世間脩惠境界智者所知明非報生識智境界唯是真證智境界耳准依地論釋之應爾亦可初言細微難知非聞惠境非思量者非思惠境是智者知是脩惠境故地持言用脩惠知不以聞思識諸法義如此說者緣脩行中思脩識智通名思惠真證行德方名脩惠難信可解三何以故下指示深躰何故問也四諦唯是染淨因果此相麁淺何故言深下對弁之以此諦處說如來藏是故言深四如來藏者如來境下寄人顯深是如來境就勝顯妙言非聲聞緣覺境者對下顯深何故唯說非二乘境釋言凡夫全不觀諦非彼境界理在易知為是不論菩薩之人能信能知由是不說地前能信地上能知自下就藏說諦之中句別有三初言藏處說聖諦者就實弁相如來之藏不染而染為苦集諦非淨為淨為滅道諦故就藏處說聖諦矣二藏處深下以藏甚深類顯諦深將諦攝藏藏即諦實故諦深也三微細下顯諦深相於中還明難知故深難信故深義同前解自下第三明法身章三句釋之一解章名此章名為法身章也恒沙佛法顯成佛體故名法身二釋來意何故須弁向前明藏藏義在隱法身離相在隱難明出相易顯欲以出纏易顯之身示彼藏故須論之三隨文釋於所纏藏不疑惑者於出法身亦无疑惑以前顯後還欲將後以顯前矣為顯藏身躰无別故於藏不疑於身亦爾上來一憣略弁三章自下第二拂權顯實指彰法躰何故須然向前雖云佛所知者是聖諦未出諦躰又前直言諦處說藏未出藏躰又前雖言於藏不疑於身不疑未出身躰故下弁之先明聖諦過恒沙下就諦明身如是法身不離已下依身弁藏與前憣中少不次第藏身同軆互相顯故諦中有三一以藏身權實顯諦權實二從如是難知下廣弁四諦權實之相三如是八下拂權顯實前中初言於說藏者舉如來藏於說身者舉佛法身不思佛境藏身實也實則非是餘人所測名不思議唯佛所知名佛境界及方便說藏身權也何者藏實謂真如性何者藏權如說生死以為藏等何者身實所謂諸佛法身自躰何者身權隨化世間示有斷德心決定者於前藏身權之與實信不疑也此即信解脫二諦者以前顯後但能信彼藏身權實當知亦信諦權實也問曰是中為弁四諦何不直望就彼諦中以顯權實乃舉藏身以顯諦乎釋言四諦依藏身說依藏權實說苦集諦依身權實說滅道諦故舉藏身第二廣弁諦權實中文別有三初言如是難知難解說二聖諦捴以㯹舉權實難分故難解知二列兩名權名有作亦名有量實名无作亦名无量噵作无作從行彰名據小觀諦望後更有大乘諦觀可以脩作名為有作據大觀諦望後更无餘觀可作名曰无作言量无量當法立於中略以三義弁之一寬狹分別有作之中苦集唯正分斷因果滅道唯是分段對治故名有量无作之中苦集該通分段變易兩種因果滅道該攝分段變易二種對治故名无量二淺深分別小乘所觀唯知染淨因果法相又設極深唯知四諦因緣假有无性之空故名有量大乘所觀乃窮甚深如來藏性故名无量三麁細分別小乘法中雖觀四諦捴相麁知故名有量大乘法中隨別細知名為无量如一苦中具知法界微塵數苦集等亦然故涅槃云所說苦等中智所知分別苦等有无量種非諸聲聞緣覺所知我於彼經竟不說之今且約行名作无作三廣弁釋作牒初門是說有量轉名顯示有作有量並如前解下廣弁釋先問次解後捴結之何故問也何故有作名為有量下對釋之釋意如何明二乘人因他知故不知一切故名有量文中初言非因他能知一切者此文顛倒若正應言因他非能知一切苦乃至非能知一切道既知如此置非在前長成句言勢亦遠謂二乘人非因他能知一切苦乃至道耶二乘因佛為說四諦得知苦等故曰因他但知分段因之與果及彼對治不知變易故曰非能知一切耳是故下結是二乘人因他不知一切苦故所知有為生死之外別更有其无為生死因他不能知一切滅故所知有餘涅槃之外別更有其无餘涅槃有為生死是分段也蓋乃從人以判其名凡夫學人於三有中造有漏業起分段生故曰有為有為眾生所受生死名有為生死无學聖人不造結業起分段生名曰无為无為聖人所受生死名无為生死有餘涅槃是小滅也望後有餘大涅槃在將後別前故曰有餘无餘可知且結苦滅集道不論无作諦者牒前第二說无量者轉名顯示无作无量偏同前解下廣釋之先問後釋何故問也何故无作名為无量能自下釋釋意如何正明如來自力知故能知一切故曰无量一切苦報由因納得名為受苦受苦家集名為受集受苦家滅名為受滅受滅家道名受滅道上來第二弁諦權實自下第三拂權顯實如是八諦權實雙牒權實各四故有八諦如來說四拂權顯實就前八中无作四諦是佛所知故言如來說四諦矣如是四下廣弁此四是如來諦先開二門後廣釋之言二門者如是四諦如來事究竟是第一門非羅漢等事究竟者是第二門何故如來名事究竟諦有二種一者諦法所謂一切染淨法相二者諦事所謂自身染淨因果究竟亦二一解究竟解知一切四諦法相二行究竟於己諦事苦集斷盡滅道脩滿今據後門故說如來事究竟耳何故二乘名事不竟義亦有二一解不究竟於四諦法知之不窮二行不究竟於己苦集斷之不盡於己滅道脩之不極今據後門是故說事不究竟下廣釋之先解二乘何故問也何故此諦聲聞辟支偏不究竟非下中上得涅槃者對問弁釋此文是倒若正應言下中上法非得涅槃二乘隨別漸觀四諦名下中上以漸觀故不能究竟除苦斷集證滅脩道是故名為非得涅槃所謂不得大般涅槃以不得故名為四諦事不究竟下釋如來何故如來於无作諦事究竟者徵問起後以一切下對問弁釋以知一切未來苦者知苦究竟對今現在所斷之集苦皆在當故說未來佛是知故永更不受斷一切煩㤕所攝集者斷集究竟五住根本是一切惚五住所起是上煩惚此二煩惚通攝分段變易因盡故言所攝一切集滅一切下證滅究竟初滅一切意生身陰事滅究竟初地已上變易之身是意生陰如來盡滅名滅一切當知如來分段變易因果皆滅今對後說是故偏言滅意生陰苦滅作證理滅究竟苦滅作證略以㯹舉諸法躰家名之為滅此滅一切今對初門且言苦滅下重顯之非壞法故名苦滅者蕑前事滅所言已下正顯理滅所言牒前下正弁之无始乃至離盡常住對苦彰滅无始作起不同苦生初生名始緣集作因生曰起此等皆无言无盡者不同苦滅言離盡者顯前无盡彰此理滅躰離終盡言常住者顯前无始无作无起自性已下對集彰滅性淨論躰離惚出相即惚无㤕名之為離非對治離此滅一切今且約對苦集言耳自下文中就此理滅明如來藏法身空義隱覆三章初過恒沙不離不脫不異不思佛法成就說身顯上第三法身章也過恒沙等舉法身因恒沙是數如來藏中備具多法過恒河沙名過恒沙是義云何真識躰中具一切法所謂法界三昧智惠神通解脫陀羅尼等一切佛法如妄心中具過恒沙一切煩惚彼妄想心雖未對緣現起貪瞋已是一切貪瞋之性雖未對緣現起癡慢已是一切癡慢之性如是一切真心如是雖未對緣現起諸德躰是一切恒沙法性息除妄想真心即是一切德故故馬鳴言從本已來具足一切性功德法如來藏經言眾生身中具足一切種德如模中像華嚴經言一切眾生心微塵中具无師智无㝵智廣大智等與此所說其義大同下弁其相是諸佛法同躰義分非全別躰故曰不離躰真常住不可因緣易脫使失故云不脫始終不變名為不異妙出情分名不思議此法本來性常成就為妄隱覆相似滅壞後息妄染本隱佛法顯成今德名為成就如是成時說為法身如是法身不離煩惚名如來藏顯前第二如來藏章上先說藏後約弁真今先明身後約顯藏文左右耳自下次明空義隱覆三句釋之一解章名此名空義隱覆真實妄法虛无名為空義空覆藏性名隱真實二釋來意何故須弁前說藏中有其能藏所藏之別能藏須弁是以論之三分文釋此章有二一明空義隱覆真實二一切苦下復宗明前滅道二諦前中人二文別有四言人二者一明佛有智不為空覆二明餘人无智空覆問曰是中為明隱覆直明餘人被覆便足何須明佛釋有兩義一對智弁愚彰覆義顯故須論智二欲使人捨愚求智學為不覆是以須弁言文四者一略明如來有智不覆二從一切阿羅漢下略明餘人无智被覆三有二種下廣前如來有智不覆四從一切阿羅漢下廣前餘人无智被覆就初段中如來藏智是空智者如來知藏名為藏智如來知空說為空智藏智藏空義有通別後當具論第二段中羅漢辟支大力菩薩舉被覆人不見不得彰被覆相見者是解得是者證此等昔來於藏於空未解未證名不見得小乘法中凡夫學人亦未見得據勝偏舉羅漢辟支大乘法中外凡善趣亦未見得據勝偏舉大力菩薩地上分見故不論之第三段中有二舉數藏智空智列其二名藏智空智釋有通別別則知真名為藏智知妄之解名為空智故下文中空與不空二皆名藏俱是空故下文說為此二空智若據斯義藏智空智齊有二種問曰妄法云何名藏以藏能故云何名空以虛无故真實之法云何名藏以所藏故云何名空以其无相及无性故云何无相如馬鳴說是真如法從本已來離一切相謂非有相非无相非非有相非非无相非有无俱相非一相非異相非非一相非非異相非一異俱相如是一切妄心分別皆不相應云何无性如來藏中恒沙佛法同一躰性互相緣集无有一法別守自性故名為空如就諸法說以為常離諸法外无別有一常住性可得我樂淨等類亦同爾又就常等說為解脫離常等外无別有一解脫自性法身波若類亦同爾如是一切是故諸法皆无自性无此性相故說為空問曰世法緣集无性則是无常真法緣集以何義故不是无常釋言世法別躰緣集以別躰故可離可脫可異故是无常如來藏中雖具諸法同躰緣集以同躰故不離不脫不斷不異故非无常如世虛空无為无㝵无有不動同躰義分不可易脫故非无常下釋其相先解所知此二空下解釋能知解所知中先妄後真妄是能隱真是所隱如來悉知是故不為空義覆真妄中世尊空如來藏捴以㯹舉此義云何釋有三種一妄法中空无真實如來藏性名空如來藏二妄法虛无故名為空知此空義能成如來故名空義為如來藏三空法能藏如來真性名空如來藏若離脫異弁釋其相妄法別起其躰不一是故言離可以對治因緣易脫故名為脫始終變改目之為異一切惚藏指示其躰煩惚業苦皆是空藏就本以說偏言煩惚下明真中不空藏者捴以㯹舉恒沙佛法躰有不无故曰不空過下釋之過於恒沙列其數也不離脫等弁其相也言佛法者示其躰也此佛本法非果法矣下釋能知此二空智捴以㯹舉如來知向空不空藏名二空智知不空藏云何名空義如上釋真法離相及離性故通名為空諸大聲聞能信如來寄人顯深佛智深故唯大聲聞信能如來有此二智能知二藏餘皆不信地前菩薩阿含行成名大聲聞依教信佛能知二藏名信如來上來第三廣明如來有智不覆自下第四廣明餘人无智被覆羅漢辟支舉能覆人言空智者是能覆心所解不真故名空智於四不倒境界轉者正明覆真如來藏性常樂我淨說為四種不倒境界二乘妄謂无常與苦无我不淨目之為轉是故下結是二乘人於四轉故於如來藏不見不得本所不見不能解也本所不得不能證也凡夫二乘地前菩薩皆不見得今此何故偏說二乘釋言二乘尚不見得何況凡夫是以不論又二乘人於如來藏起四顛倒過鄣深重是以偏說地前菩薩信佛語故起於常樂我淨等想无四顛倒是以不弁上來正明空義隱覆自下復宗明滅道二諦先明滅諦一切苦滅唯佛得證是理滅也壞煩惚藏是事滅也悟實不起故名為壞前對一切意生身陰以論事滅今對煩惚左右言耳脩滅苦道復宗明道此明如來道中究竟此四諦下明一諦章三句釋之一解章名就四諦中其唯蕑取一苦滅諦以為藏躰故云一諦問曰藏躰是四諦實今此何故偏言一諦釋言弁義凡有三種一隨詮弁實實在四中如涅槃說彼故經言有苦有諦有實乃至有道有諦有實二蕑淨異染四諦之中所有理性攝在滅道苦集不論何故如是滅道是淨相順於理故攝在中理法虛通即名為道理法家靜說之為滅故涅槃云第一義諦亦名為道亦名涅槃三蕑勝異劣四諦實性同攝在滅餘三不論以滅精極故攝在中餘相麁鄙故癈不論今據後義偏云一諦二釋來意前弁空義是其能藏一諦一依是其所藏所藏之中一諦藏躰故須論之三分文釋此章有二一蕑相取實二不思議下對情顯深前中先略後廣釋之此四聖諦三是无常一是常者是其略也此四牒上无作四諦三无常者苦集及道是无常也問曰苦集无常可爾无作道諦云何无常釋言无常有二種義一者有始二者有終苦集二諦有始有終故是无常道中緣觀對治之道亦有始終故是无常真實之道雖无終盡而是有始故曰无常一是常者滅諦是常彼滅諦中事盡之滅斷鄣始得亦應无常然今且據理滅為論故說一常下廣釋之先問起發何故三諦皆是无常一偏是常下對釋之先解三諦句別有九初有三句當相弁釋三諦牒前入有為者苦集及道從緣集生故曰有為有為始起故是无常緣集无實名虛妄法次有三句對真弁非言非諦者就前虛妄明非真諦言非常者就前无常明非真常言非依者就前有為明非真依有為虛敗故不可依後三結之言是故者是苦集道有為无常虛妄法故非第一義非常非依下釋一諦句應有九文中少二但有七句初有三句對相弁異離有為者異上初句不從緣集故離有為言是常者此句正應名非无常異前第二非虛妄者異上第三次有三句當相弁釋言是諦者就前非妄明是真諦言是常者就前第二明理是常言是依者就上初句非有為相明是可依以非有為躰真常住故可依正是故下結應有三句文但有一言是故者是一苦滅離有為相非是无常非虛妄故是第一義乃至是依然此文中但結是諦是常是依略而不結上來第一蕑相取實自下第二對情顯深於中初言不思議者捴嘆顯深情緣不及名不思議下別顯之別中有二一理出情外二凡夫識者二見倒下情不及實前中初法次喻後合法中是滅過一切生心識緣者出過凡也亦非二乘智惠境者過二乘也喻中如盲不見眾色喻過眾生心所緣也色喻滅諦盲喻凡也七日嬰兒不見日輪喻過羅漢辟支境界日喻滅諦七日嬰兒喻二乘也七日嬰兒但見日光不見日輪聲聞辟支但見理相不見理實下次合之滅諦如是合前眾色及日輪也非凡心緣合盲不見亦非二乘智惠境者合前嬰兒不見日輪上來第一理出情外自下第二情不及實先開二門凡夫識者二見顛倒是第一門斷常兩心名為二見建立常樂我淨等想說為顛倒下文別解宜須記知羅漢辟支智者是淨是第二門下廣釋之解初門中先明二見後弁顛倒明二見中初先正弁二見之相此妄想見於彼義下明不及實前中邊者捴以㯹舉斷常二見乖中曰邊下釋有二一依我起邊二見諸行下依法起邊依我起中凡於五陰我見計著是邊見本五陰之果由因納得名五受陰凡夫不識妄取為我名為計著由我起邊故說為本生二見下正明起邊取我為常即生常見取我為斷即生斷見是名結之所謂斷常列邊見名下依法中初依生死涅槃二法以起邊見二依色心而起邊見就依生死涅槃法中見行无常是斷見者依生死法起斷見也五陰集起名為諸行見此諸行无常滅壞故起斷見是斷非正結以顯非見涅槃常是常見者依涅槃法起常見也此何涅槃別唯究竟大般涅槃通則三乘所得皆是涅槃涅槃實常還見為常應是正見何故言邊釋言涅槃雖復是常是因緣常非定性常取為性常所以是邊是常非正結以顯非理實生死涅槃法中皆起斷常但諸眾生現見生死无常滅壞多起斷見見涅槃法无為永安多起常見故偏說之妄想故者捴明斷常起之所由由妄想見故起斷常下就色心起邊中作如是見於身諸根分別見壞於續不見起斷見者依色起斷眼耳鼻等是身諸根現根盡滅名現法壞於未來世更有報起名有相續愚闇不見便謂之斷妄想故者明起所由於心續下依心計常心法續起名心相續凡夫不知謂是常然名闇不知剎那間意識境界顯不解相剎那是念念念之中前為意根後為意識意根意識分齊各異名剎那間意識境界凡夫迷此名闇不解以不解故便起常見猶如小兒見旋火輪謂不斷絕妄想故者明起所由上來第一正明起邊下對苦滅彰情迷實此妄見者牒上所弁斷常二見於彼若過若不及者正明迷實謂於向前一苦滅義斷者太過常者不及問曰向前計我人等以為斷常何關滅事而於滅義過與不及釋言理不離事故爾彼斷見者謗无世事以无事故不得就之推求趣實名為太過彼常見者執取事相不得捨事以取實義說為不及其猶世人見繩為虵棄虵求繩即是太過留虵求繩便為不及此亦如是作異分別若斷若常顯過不及背正取耶名異分別斷顯太過常顯不及上來第一廣明二見下顯顛倒顛倒眾生舉倒見人於五受陰是倒見處无常常等是倒見心通而論之於五陰中同起四倒別則迷色起於淨倒迷受起樂迷識起常迷想迷行起於我倒問曰五陰實是无常苦无我等凡夫何緣計為常等如雜心釋以其相似相續覆故計之為常威儀覆故計以為樂作業覆故計之為我薄皮覆故計以為淨問曰經中說生死法具有五義无常苦空无我不淨今此何故偏說四種憣為四倒釋言此等離合故爾若就生死无我法中分空无我則有五義如成實說眾生空者名之為空法躰空者說為無我如維摩中眾生空者說為无我法躰空者名之為空故彼經言眾生是道場知无我故一切法是道場知諸法空故由分此二故有五義憣對此五倒亦應然今此合故但云四耳又問无我理通染淨今此何故偏說生死以為无我憣之說倒然我无我通局不定凡有四種一就解惑二情相對生死有我涅槃无我以著我故世間受生故說有我離我不生便證涅槃故說无我故地經言世間受生皆以著我若離著我則无有生斯文顯矣二就法相虛實相對生死无我涅槃有我生死之法虛誑不實又不自在故名无我涅槃真實具八自在故說有我故經說言生死无常无我樂淨涅槃之法常樂我淨三據如理二俱无我故經說言凡夫我空乃至諸佛生死法空乃至涅槃四就假用及實以論生死涅槃二俱有我生死我者有其二種一者世諦假名之我謂五陰法和合為人故經說言眾生佛性不離六法六者所謂五陰及我二實性之我故經說言廿五有有我不耶佛言有我我者所謂如來藏性生死之中具斯二我涅槃亦爾諸諸德和合名之為佛是其假我窮其躰實即是性我我无我義通局如是今據第二故說生死一向无我憣之宣說取我為倒上來明凡二見顛倒下次解釋二乘淨智於中初明羅漢辟支不見真實或有眾生信佛語下舉勝況劣前中羅漢辟支淨智牒舉上門於一切下明不及實一切智境是一苦滅如來法身是佛果德羅漢辟支雖云淨智於彼身境本不見也自下舉勝况劣之中舉彼地前信行菩薩況顯二乘於中初至得法餘財是舉勝也世尊淨下是況劣也前中有三一明地前以為正見二何以故下釋其正見三是真子下嘆其正見就初句中或有眾生舉正見人所謂種性解行眾生信佛語故正見所由自未證法依教生信名信佛語起常等想是正見心未有真智故名為想非顛倒見弁正異耶異前凡夫所起四倒是名結之第二釋中先問後解何故問也前於五陰起常等想名為顛倒今此亦起常樂等想何故名正下對釋之如來法身是常樂等想舉境顯心如來法身常中徹倒名常波羅蜜樂等亦然佛德无量以何義故偏舉此四佛德雖眾蓋乃且據一門言耳於中略以五義建立一治患不同生死法中有四種患謂无常苦无我无淨憣對彼故宣說如來常樂我淨二憣倒不同聲聞聞說生死之法无常苦等謂佛亦然起四顛倒憣對彼故說佛常等三除鄣不同故立四種言四鄣者如寶性論說一者緣相謂无明地鄣佛真淨對除彼故說佛真淨二者因相謂无漏業鄣佛真我對除彼故說佛真我三者生相謂意生身以此意生苦陰身故鄣佛真樂對除彼故說佛真樂四者壞相謂變易死鄣佛真常對除彼故說佛真常四離過不同故立四種言四過者如寶性論說一闡提謗法鄣佛真淨破除彼故說佛真淨二外道著我鄣佛真我破除彼故得佛真我三聲聞畏苦鄣佛真樂對除彼故說佛真樂四辟支捨心捨諸眾生鄣佛真常對除彼故說佛真常五酬因不同故立四因言四因者如寶性論說一者信心除闡提謗法得佛真淨二者波若除外道著我得佛真我三者三昧以空三昧除聲聞畏苦得佛真樂四者大悲常隨眾生除辟支捨心得佛真常以斯五義故立四種上來一段舉境顯心於佛法下明心境以佛法身是常等故於佛法身起常等想名為正見問曰前說羅漢辟支於智境界及佛法身本所不見今此何故偏於法身起常等想名正見乎法身顯現易生相故第三嘆中正見牒前下嘆有五前四行益後一法資行中真子一句是捴成人益也有此正見定能紹繼故曰真子後三是別起益行也從佛口生是聞惠也教出佛口依口生解名佛口生從正法生是思惠也思從理起名正法生從法化生是脩惠也行德先无今時忽起故云化生得法餘財是法資也地上得理名為正財今得教資說為餘財上來弁勝下況劣中句亦有三一對劣顯勝二此淨下將勝況劣三何故下問答弁釋就初句中言淨智者牒向地前正見眾生彼於佛身離四顛倒故曰淨智羅漢辟支智波羅蜜對劣顯勝地前淨智望彼小乘羅漢辟支得為究竟智波羅蜜不名羅漢辟支佛智為波羅蜜第二句中此淨智者牒向地前淨智之者雖曰淨下將勝況劣地前菩薩望彼二乘雖名淨智於一苦滅尚非境界況彼二乘四依之智二乘之智依四諦生名四依智問曰緣覺不觀四諦云何亦名四依智乎此如上釋第三句中何故問也問意如何四依之智既不智滅如來昔曰何故說之下對弁釋明四依智現雖不能得一苦滅當能證會故佛為說三乘之中二乘所行為大方便故名初業就初業中不愚法者觀察四諦斷麁煩惚漸向苦滅終能證會是故名為當覺當得覺是解也得是證也為是義故如來昔曰為說四依此四依下是一依章三句釋之一解章名一苦滅諦能為染淨所依正處故名一依二釋來意前明一諦是所藏躰依躰有用故須弁之三分文釋此章有二一蕑相取實明一依躰二生死依下依實起相明一依用前中此四是世間法蕑相異實謂彼二乘所依四諦是世法也苦集是其分段世間滅道是其變易世間一依已下蕑實異相言一依者一切依上捴以蕑之過彼小乘有作四依亦過大乘无作三依名一切上下別蕑之出世間者過前世間有作四依言上上者過彼大乘无作三依无作三依望前四依已名為上一苦滅諦上於彼上故云上上第一義下示其躰相明依用中文別有三一明藏性能為染依二若无藏不得厭下明如來藏能為淨依三何以故下雙釋前二前染依中文別有四一明依義二從生死生死已下明其相依不一不異三是故如來藏是依持下結前第一四不離下釋前第二初中有三一明依義二明持義三明緣起建立之義世尊生死依如來藏是依義也生死依真如波依水亦如夜闇見繩為虵虵必依繩以藏說本不可知者是持義也由藏持故久續不斷故說本際不可知也有藏說死名善說者是其緣起建立義也由藏起染故得就之說為生死此言當理名為善說一生死法隨義別之攝之從情悉是情作情作託真故名為依真能持彼故說為持攝彼生死以從藏躰皆真心作彼名為緣起建立義矣第二不一不異之中先明不異世間言下明其不一不一成前依持義也不異成前緣起義也明不異中先解生死後弁不異解生死中生死生死捴以㯹舉生死非一故重言之又生死中有其二種一生死生死凡夫所起二涅槃生死如涅槃說大般涅槃能建立大義種種示現今為蕑後涅槃生死偏舉初門是故說言生死生死下釋其相諸受根沒解其死也眼等是根現在六根現生覺心名諸受根沒沒猶死也不受根起釋其生也生隣前死故云次第未來六根未生覺心名不受根根生名起是名下結下顯不異言生死者牒舉前生死此二法者生死二法言是藏者就相弁實故言是藏如人夜暮見繩為虵虵是繩也亦如有人見南為北北為南也如是一切明不一中先解生死後明不一解生死中世間言說有死有生彰其分齊噵其世間言說故有即顯非藏諸根壞者解其死也此猶是前諸受根沒新諸根起釋其生也猶前次第不受根起非如來下明其不一非如來藏有生有死正明不一真妄性別是故言非藏離有為釋顯非一離有為故非生非死常住不變釋離有為第三結中言是故者是彼生死依藏等故如來之藏望彼生死是依是持是建立也是依結前生死依藏是持結前以藏說本不可知也是名結前有藏說死是名善說第四重釋不一不異中但釋不一不異一邊略而不解文中先弁如來藏相斷脫異下對妄以顯不一之義弁藏相中不離不脫不異不思義同上釋言不斷者藏性常住故曰不斷下顯異中斷脫異外有為依持建立等者生死是其斷脫異法藏躰異彼是故言外能為妄本名有為法依持建立如此義者是如來藏上明染依下明淨依无如來藏不得厭苦求涅槃者返明淨依若不依真妄不孤立故无厭苦求涅槃義如人睡時若无報心則无夢中背河求出此亦如是何以故下雙釋前二何故問也妄心自能興染造淨何須依藏下對釋之於中初先明妄不起如來藏者无前際下明真能起妄謂七識真謂藏識此猶經中所說八識八識之義廣如別章此應具論前明妄中於此六識及心法智舉其妄心六是事識及心法智是第七識迷時名心解名法智此七不住明其離真妄躰不立事六妄一合為七法无真此七一念不立名剎那不住不種已下明其離真妄則无用後明真中如來藏者舉其真識无前際等彰其躰常无前不起明真不生言不滅者顯真不盡種諸苦等明真有用種苦起染厭樂興淨如來藏者墮身見下是其顛倒真實章也於中亦以三句釋之一解章名妄情憣理名倒真實二釋來意此章釋前空義隱覆有之所由由其顛倒真實故有三分文弁釋此章有二一明實異情二彰情倒實如來藏者非我非生非命非人是初段也上來說藏為染淨依相同外道所見神我故今說非我眾生等有何差別別對說非通釋是一其猶眼目別解各異如經中說觀內无我外无眾生內外和合无其壽命畢竟清淨所以无人陰非神主名內无我我離陰亦无名外无生陰與假生相續名命无別命躰故言內外和合无命諸陰和合宰用名人无別人躰故言畢竟清淨无人如來藏者墮身見下彰情倒實藏者是其所倒真實墮身見等是能倒情情墮耶妄目之為墮身見眾生非境界者凡夫倒也顛倒眾生非境界者二乘倒也二乘於藏妄計无常苦无我等故云顛倒空亂意生非境界者菩薩倒也大乘人中多習空者妨亂真解名空亂意藏非彼知名非境界如來藏者是法界下自性清淨隱覆章也於中亦以三句釋之一解章名藏躰无垢名性清淨隨緣相染故云隱覆二釋來意何故須弁前一諦章明藏躰淨一依章中明藏用染躰若清淨用應不染用若成染躰應不淨故今釋之心不惚惚不心故性清淨而為客塵煩惚所污故用成染三分文釋此章有二一勝鬘正說二如來述成勝鬘說中有略有廣初至不思如來境界是其略也餘是廣也略中有四一明性淨二客塵下彰其用染三不思下明下不惻四如來境下彰唯佛知就初句中如來藏者牒前藏躰是法界藏轉名顯示於此藏中曠備一切恒沙佛法恒沙法異名法界藏法身藏下約時分異彼前藏躰在佛果德名法身藏在初地上名出世間上上藏在凡位中名性清淨在染不同故云性淨第二句中此性清淨牒上後句而客塵下從緣說染而是返前起後之辭藏性雖淨而有染也五住後起依真名客坌污塵五住所起麁強曰上真不離此故為之染第三句中不思議者明下不惻第四句中如來境者彰唯佛知上來略竟自下廣之何故問也何故是淨而復是染復言不思如來境界下對弁釋依上四句次第釋之解初句中剎那善心非煩惚染剎那不善亦非染者正解淨義剎那是念念善心躰煩惚不染念惡心躰惚亦不染不染故淨惚不心心不惚釋前不染惚出妄情不及真識故不心據真无妄故不惚其猶世人見繩為虵虵出妄情故不繩繩躰常淨亦不虵云何不而能染者責遣染過然有惚下釋上第二而客塵染然有煩惚有能染也有惚染心有所染也自性淨心而有染下釋第三句不可思議性淨有染難可了知故不思議唯佛已下解第四句如來境界實眼智等備如上釋上來第一勝鬘正說自下第二如來述可於中初先內心隨喜如是已下發言述成如是如是捴述其言如勝鬘語是當道理故曰如是所說契當故使如來重言述之自性淨下別述其言於中初至亦難了知述前第一第二第三如此二下述上第一第二第四前中性淨有染難知捴述其言有二下別先舉二數謂下列之後中初言如此二法牒前性淨有染二法汝及成下舉彼餘人下能窮證顯成唯佛知見之義汝者對面汝於勝鬘勝鬘位分在於地前大法菩薩在於地上餘聲聞者是小乘中大阿羅漢如向二法勝鬘及與大法菩薩乃能聽受諸餘聲聞唯信佛語未能證染淨所以故唯佛知若我弟子隨信已下是真子章於中且以四句釋之一解章名於法信順堪紹佛位故名真子二釋來意前十三章明一乘法今明於法信順利益故次論之三定說人此章佛說餘皆勝鬘何故偏爾信益深淺非佛不裁故佛說之又復勝鬘親是信人自彰信益儀中不便故佛說之四分文弁釋此章有三一明信利益二於我滅下嘆信利益三信如來者有如是下結信利益前中初先正弁信益位別有四初隨信者是種性前善趣地中隨教生信故名隨信又此信心隨種性上增上之信故曰隨信增上者是種性地所成信也依明信隨順法智是解行地所成益也名前上信以為明信依彼信已起解行中觀解方便此觀順於初地已上成就法智名隨法智而究竟者是初地上法智成也望前三階說為究竟有難解者下重辦之隨法智者牒前第三以此解行臨入初地多脩觀解方能趣入是義難識故重弁之先別後結別中有五初二觀染後三觀淨染中初一觀十二入觀施設根是六根也根无定性因緣集起故曰施設意解境界是六塵也境无定實從妄想起名意解境根言施設類餘皆然境云意解類餘齊爾今就初門彰此觀相餘略不論觀業報者觀因果也集因名業苦果報下觀淨中觀羅漢眠是淨果也羅漢所入无餘涅槃與眠相似故說為眠理實通觀三乘之滅據小為言偏云羅漢後之兩句觀淨法因心樂禪樂是其定也心樂定果神通意名心自在禪樂定躰羅漢辟支聖自在通是其惠也聖智自在通解諸法名聖自在通據後說觀羅漢辟支大力菩薩類前皆爾何故不觀地上菩薩偏觀大力釋言此觀破虛入實羅漢辟支地前菩薩緣觀不真故偏觀之此五巧成釋已捴結於前五法巧觀趣實名巧便觀自下第二嘆信益中先牒前四後就嘆益於我滅後未來隨信牒上初門當佛在時多善眾集非直能信亦堪入證未來惡時信之者難故偏舉之信增上者牒前第二依明信已隨順法智牒上第三自性淨心彼為染污而得究竟牒前第四下就嘆益是究竟者據後重牒理通前三入大乘因正嘆信益此名佛果為大乘道彼究竟者能入彼乘與佛作因名大乘道因信如來下是其第三結信利益自處无知仰推如來名信如來始成隨信乃至究竟入大乘因名大利益不謗深義勝鬘自下是其勝鬘師子吼章三句釋之一解章名言勝鬘者㯹人別德何故此章偏云勝鬘以此外化化益在人故偏舉之師子吼者借喻名德如世師子嘋吼之時有所摧伏勝鬘如是外化之德能摧惡人是故就喻名師子吼如經中說世間師子嘋吼之時為十一事一為破壞實非師子詐師子二自試身力三自淨住處四令諸子知其處所五令群輩無怖畏心六眠者得悟七為一切放逸諸獸使不放逸八令諸獸咸來依附九為調伏大香鳥等十為教諸子十一莊嚴諸眷屬故諸佛菩薩為師子吼事亦同然一為摧魔軍二示眾十力三開佛行處四為耶見作歸依處五為安撫怖畏眾生六覺悟无明睡眠眾生七行惡法者為作悔心八開視耶見令諸眾生知六師等非正師子九為破壞富蘭那等亦令二乘生變悔心十為令五住菩薩生大力心習種性種合為一住解行為二淨心為三二地已上行跡為四八地已上決定為五十一為令正見之眾於耶見者不生怖心勝鬘今日為師子吼齊應具此但今文中說降惡人為師子吼即是向前十一事中第一第四第七第八第九事也二釋來意何故次弁向前十四章明其自行自行既成德堪化益故次論之三分文釋此章有五第一勝鬘承力求說二如來聽許三勝鬘正說四說已頂禮請佛述成五如來述讚勝鬘白佛更有餘益我承佛威復說斯義是初段也對前自利名後化他以為餘益現承佛威彰說契當故承佛力前彰自利更論利他故云復說佛言便說是第二段化德須陳故言便說勝鬘白下是第三段於中有二一蕳去善人二諸餘下偏就惡人以明化益前蕑善中先舉善人後捴蕑之舉善人中男子女人於義離毀生德入大捴舉善人前真子中有四真子此合為三初二為一後二各一故有三種三中初一於義不謗名離毀傷第二能生出世聖道名生功德第三能入諸佛果德名入大乘何等已下別列善人先徵後列從上至下次第列之男子女人成深法智是初地上法智究竟成隨法智是解行地隨順法智於諸深法不自了下是解行前隨信信增此舉善人除此已下捴以蕑之下對惡人明化益中除此餘生捴舉惡人於諸深下別列惡人於諸深法堅著妄說是內學中執耶過也堅著心耶妄說口耶違背正法是內學中乖正過也習諸外道是外學中執耶過也腐敗種子是外學中乖正過也壞正信心名敗種子當以王下明其化益惡人難調強力方制故以王力天龍鬼力而調伏之上來第三勝鬘正說爾時已下是第四段請佛述成行違攝物相似非善故須請述令他施習善哉已下是第五段如來述讚善哉捴嘆於染下別於深守護降非得宜嘆其所作守謂守正降謂降耶汝已親下嘆其所說以近多佛故能說此外化行義通則說此一部經義上來正說下明流通於中有四一明如來為化既周還歸舍衛二時勝鬘下明勝鬘等覩別戀仰三還入城下勝鬘以法傳化流通四入祇洹下如來以法付屬流通初中世尊放勝光明普照大眾示將別相化意已暢故光轉勝昇空去地七多羅樹彰行分齊前說經時佛雖在空去地不遠今說既竟將欲廻還故昇虛空高七多羅樹一多羅樹去地七刃一刃七尺一樹合有卌九尺七樹合有三百卌三尺足步虛空還舍衛者現勝神力令物敬也第二段中時勝鬘等㯹列敬人合掌已下三業仰合掌向佛觀无厭足目不暫捨是身業也過眼境已歡喜各嘆如來功德是口業也盡其肉眼所見分齊名過眼境慶蒙法利所以歡喜喜故讚嘆人人別嘆故云各各具足念佛是意業也於佛色身及諸功德皆念在心故云具足第三段中還入城者傳化方便勝鬘住宮與王別城今欲化王須詣王所故入城中向友稱王稱嘆大乘先化王也王是國主今欲與之共率國民故先化之城中女下勝鬘與王隨類別化第四段中文別有四一佛入祇洹告念所付二時天帝下所付皆至三向天帝下佛為說經以法付囑四天帝阿難及大會下明諸大眾聞法喜行就初段中如來初先身入祇洹次口言告命阿難阿難同處故直告之後以心念念於帝釋帝釋在遠故佛念之帝釋胡語是帝主也釋是能也能為天主故名帝釋第二段中時天帝釋忽然至者聖心相鑒故佛念時天帝即至阿難先在故不說之第三段中先為說經說已告下以法付囑初先通付天帝阿難復憍尸下別付帝釋通中有二一嘆益勸持二帝釋白當何名下別名教持嘆益勸中先付帝釋後付阿難付帝釋中汝當受持讀誦此經直勸受持男子女人於恒沙下嘆益勸持是故已下結勸受持嘆益勸中憍尸迦者告命所付此憍尸迦帝釋別如龍樹說過去世時波羅捺國有波羅門姓憍尸迦聰明多智與其同類卅二人共脩福業命終憍尸得為天主餘卅二皆為輔臣佛知此事從本以呼名憍尸迦於恒沙劫脩菩提行行六波羅蜜舉劣顯勝若復聽受乃至執經福多彼者弁勝過劣謂於權化大乘法中取相脩行六波羅蜜不知於此顯實教中聽受讀誦乃至執經以此經中顯彰一乘開示藏性故少聴受讀誦執持福多於彼此執持者於經樂愛欲披非是汎爾求理如此執持福多於彼何況為人以劣況勝自持尚多況為他說是故已下結勸受持言為卅三天說者刀利天中具有卅三種住處帝釋住處即以為一面各八臣住處各異故有卅三天之別此皆帝釋所王領處故勸為說下付阿難相顯可知第二列名教持之中初帝釋請當何名經問經名字云何奉持問持之儀下佛答之文別有三初言此經成无量德聲聞緣覺不能究竟觀察知者彰此法廣名不能窮二憍尸迦下顯此法深名不能盡三今當下據其捴要列名教持於中初先聽許說時天帝下奉教領受佛言已下列名教持一一章中皆初列名對上初問後教受持對上後問此嘆如來真實德者是前如來妙色身等如是持者依此名字慍守不失即名受持後餘類爾不思大受是前恭敬受十受等一切願攝是前勝鬘復於佛前發三願等不思攝受是前承佛說調伏等說入一乘是上佛告汝今更說諸佛所說攝受法等無邊聖諦是前文中初觀諦等說如來藏是前文中於聖帝處說深義等說法身者是前若於无量煩惚所纏不疑於出煩惚法身不疑空義隱覆是前文中如來藏智是空智等說一諦者是上此四三是无常一是常等說一依者是前此四是世間法一依出世如是等也顛倒真實是前文中如來藏者非我非生非命人等性淨隱覆是前文中如來藏者是法界藏等說真子者是前隨信信增上等勝鬘夫人師子吼者是前文中更有餘益復說斯等自下第二別付帝釋良以帝釋在家俗人慮不在心故別付之又以帝釋住壽多時傳至末法故佛別付先嘆經勝次以付囑至法住者出其時分釋迦正法有五百歲像法千載末法萬年於此時中汝當讀誦為人廣說帝釋白下奉教傳持第四大眾聞法善行相顯可知大隋大業九年八月五日沙門曇皎寫之流通後世校竟也經疏卷之下
