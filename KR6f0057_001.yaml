body:
  text: 沙門釋慧遠撰聖教萬差要唯有二謂聲聞藏及菩薩藏教聲聞法名聲聞藏教菩薩法名菩薩藏聲聞藏中所教有二一聲聞聲聞二緣覺聲聞聲聞聲聞者是人本來求聲聞道常樂觀察四真諦法成聲聞性於最後身值佛為說四真諦法而得悟道是人本來有聲聞種性今復聞聲而得悟道是故說為聲聞聲聞如經中說為求聲聞者說四真諦法提斯為言緣覺聲聞者是人本來求緣覺道常樂觀察十二緣法成覺性於最後身值佛為說十二緣法而得悟道是人本有緣覺種性於最後身聞聲悟道是故說為緣覺聲聞如經中說為求辟支佛者說十二緣法就此為論聲聞聲聞根性是鈍緣覺聲聞根性稍利利鈍雖殊同斯小果藉教處等是故對斯二人所說為聲聞藏此二之中各復有二一種性聲聞亦名決定二退菩提心聲聞言種性者是人本來專習小法成就小性如來出世現欲小法佛依根欲為說小法證得小果從本立稱名種性聲聞是人現在決定住小不能入大是故亦名決定聲聞退菩提心聲聞者是人過去曾習大法流轉生死忘失本心志求小果值佛出世現欲小法佛依根欲為說小法證得小果是人過去有菩提心今退住小名退菩提心聲聞種性聲聞於佛一化始終住小不能入大退菩提心聲聞始小終大去住雖殊以其當時受小處一是故對斯二人所說為聲聞藏也菩薩藏中所教亦二一是漸悟二是頓悟言漸入者即向退菩提心聲聞始時住小終能入大大從小乘謂之為漸故經說言除先修習學小乘者我今亦令入是法中此是漸也言頓悟者有諸眾生久習大乘相應善根今始見佛即能入大大不由小謂之為頓故經說言或有眾生世世以來常受我化始見我身聞我所說即皆信受入如來慧此是頓悟漸入菩薩藉淺階遠頓悟菩薩一越解大頓漸雖殊以其當時受大處一故對斯二人而說為菩薩藏聖教雖眾要不出此故龍樹云佛滅度後迦葉阿難於王舍城結集三藏為聲聞藏文殊阿難於鐵圍山集摩訶衍經為菩薩藏地持亦云佛為聲聞菩薩行出苦道說修多羅結集經者集為二藏說聲聞行為聲聞藏說菩薩行為菩薩藏地持復云十二部經唯方廣部是菩薩藏餘十一部是聲聞藏涅槃亦云十二部經唯方廣部菩薩所持餘十一部二乘所持菩薩所持猶菩薩藏二乘所持猶聲聞藏故知聖教無出此二此二亦名大乘小乘半滿教等名雖變改其義不殊今此經者二藏之中菩薩藏收為根熟人頓教法輪已知所在次釋其名勝鬘師子吼一乘大方便方廣經者蓋乃標部別之名眾經所以首題其名欲示所明之法此經所明章別十五始從欲佛終至勝鬘師子吼章章雖十五要分為二前十四章是自利行後一利佗今言勝鬘師子吼者是第十五利佗行也一乘方便及以方廣是前十四自利行也何故不次前後一章標人顯德標人在初題接中便故先舉之言勝鬘者外國名為尸利摩羅尸利此翻名之為勝亦名為首亦名為德摩羅名鬘鬘是華鬘華鬘中上故號勝鬘此人何故名曰勝鬘據相以求一切世人多依世事以名其子勝鬘父母借彼世間殊勝之鬘以名其人故號勝鬘賢聖之名雖依世事立冥與德合如彼純陀父母所立名解妙義亦如維摩父母立字名無垢稱如須菩提父母所立名曰空生皆與德合此亦如是良以勝鬘肉𬾨德慧而自莊飾如世華鬘故號為鬘德慧為鬘殊過世好是以言勝師子吼者借喻名德如世師子哮吼之時有所摧伏勝鬘外化能降惡人是故就喻名師子吼又復勝鬘宜說此經決定不怯如師子吼是故就喻名師子吼矣下一乘等相別如何就前自行十四章中初十三章是一乘體真子一章明信順益此但舉前十三章後一不論言一乘者即是第五一乘章也大方便者是前四章大方廣者是後八章良以一乘是此經中所明之字故先標之乘是行用行能運通故名為乘隨化多乘據實不殊是以言一經中說一汎有四義一簡別名一二破別立一三會別名一四無別名一言簡別者如來於彼三藏教中權說三乘求聲聞者為說四諦求緣覺者為說因緣求大乘者為說六度宣說菩薩三阿僧祗修習有漏云波羅蜜於最後身斷結成佛為簡別三是故言一言破別者佛為化人權說三乘眾生聞之執為定實佛為破之是故言一故經說言唯此一實餘二非真其猶化城非真息處言會別者如下文說於一乘中開云諸集會之歸本是以言一言無別者就實論實由來無別是故言一今此所論會別名一以於實中因無異趣果無別德故云一耳大方便者是乘因行之修善巧故號方便方便不同汎有四種一進趣方便如見道前七方便等二權巧方便如二智中方便智等實無三乘權巧為之三施造方便凡所造作善巧施為故號方便如地持中所說十二巧方便等四集成方便諸法同體巧相集成故曰方便故地論云此法善巧成名為方便今此所論是其第三施造方便又前四章漸增向果亦得說為進却方便方便中極是故云大言方廣者是一乘理理正名方苞含曰廣此等所詮經是能詮外國正音名修多羅此翻名綖聖人言教能貫諸法如綖貫華是故就喻名之為綖何不名綖乃名經乎綖能貫華經能持理其用相似故號為經名依俗訓經者常也教之一法經歷古今恒有日常此經始終文別有三謂序正流通初至嘆佛實功德來是其由序二從如來玅色身下是其正宗三放勝光下是其流通化必有由放光明序由序既興宜顯所明之法故次正宗聖者為化兼益末代故次第三明其流通就前序中義要分二一證信序二發起序辨此二序略有五門一釋序名并解立意二明兩序名之差別并顯得失三明二序名之通局四定二序文之前却五隨文解釋就初門中先解序名後解立意言發起者佛將說經先記時處神力集眾起發所說名為發起以此發起與說為由名發起序證信序者阿難稟承如來所說欲傳末代先對眾生云如是法我從佛聞證成可信名為證信用此證信與經為由名證信序名義如是次顯立意何故有二以經二故經唯是一何曾有二經體雖一隨時就人故得分二一如來所說二阿難所傳如來所說益在當時阿難所傳傳在末代對斯二經故立兩序對佛所說立發起序對阿難所傳立證信序故有兩序第二門中先彰名證信序及發起序二隨人別名如來序及阿難序發起序者名如來序證信序者名阿難序三就時以分明現在序及未來序如來序者名現在序阿難序者名未來序四對經以別名經前序及經後序名佛所說以之為經對此經故彰別前後如來序者是其經前阿難序者說為經後阿難序者更有一稱名遺教序以佛遺言教置此序故名遺教名別如此得失云何此四對中證信發起名義無失第二對中阿難序者名義無過如來序者義有不定如此經中有佛教主王及夫人栴提勝鬘共為起發諸經發起多不獨佛若言如來則闕餘人發起之義以如來序名有所闕廢而不存阿難序者不立第三對中現在無失未來有過是義云何若佛現說名現序者阿難傳時亦是現在何不名現若便對佛現在說經名阿難序為未來者亦對阿難現傳名如來序以局過去為序之時各是現在不可偏名一為未來未來不立對未之現理亦宜癈隨義且分亦得無傷第四對中經前無過經後有失若言經前可得為序既言經後云何稱序若如來序者是佛說前阿難序者亦是阿難所傳經前經後之言有過須癈經前之對理亦不立今以諸名斯皆有過故存證信發起之稱第三門中言通局者通則二序俱名證信齊號發起立序之意同為生信是故二序通名證信同為起發故二序通名發起兩義既齊何故發起偏屬如來證信序者獨在阿難為別二序隱顯別稱等為別序何不名彼阿難序者以為發起如來序者為證信乎釋言阿難位卑難信懼人輕謗立序之意專為生信故今釋者望真本意說阿難序以為證信佛德尊高人皆重信不懼輕立序之意直為發起故存義名為發起第四門中先序異說次辨過非後顯正義說如何昔來相傳經後序中有五句一如是二我聞三一時四住處五同聞有人以佛更為一句通前說六異說如此次辨過非先以理徵後以文證如是我聞此之二句經後可爾一時佛等若在經後經前無佛誰之說經無時無處說何所記經前無眾說何所被賴藉此等起發所說云何經後人復救言事實經前但是阿難後時引來證成可信故訓經後若爾何獨立句六句正說已前本但有事所有言說以後引來如涅槃經亦已前當時但可有事皆是阿難後時引來然彼所現六種相等難後引來得判經前時處佛等何為不爾以此驗求五六之言定判經後實非道理驗事如此言文證者如法華論釋法華經佛住王舍耆闍所以在此顯法勝故又地論言此法勝故在於初時及勝處說又涅槃中宣說如來二月涅槃及十五日悉有所表又彼宣說𤘽尸涅槃霍樹涅槃亦有所表佛將說經先託時處顯法發起然後說經何為經後辨過如此顯正義如是我聞定屬證信一時已下正說以前義有兩兼若取當時起說之義判屬發起阿難引來證成可信判屬證信不得偏取第五門中先解如是我聞之言三句分別一明如是我聞有之所由二明立意三解釋其文如是我聞之言有所由者諸經之首何緣悉有如是我聞由佛教置佛何因教阿難請故阿難何緣為此啟請阿尼樓䭾教其請故阿尼樓䭾何因故教由見阿難心憂惱故阿難比丘何故憂惱由見如來般涅槃故如阿含說佛將滅度阿難悲惱莫能自勝阿尼樓駄開覺阿難汝傳法人何不請佛未來世事徒悲何益阿難答曰我今迷悶知何所問阿尼樓駄遂教阿難請問四事一問佛滅後諸比丘等以何為師二問佛滅後諸比丘等依何而住三問惡性比丘云何共居四問一切經首當置何字阿難被教心少惺悟授教請譽之何為師者當依波羅提木叉為師若我住世無異於此木叉是戒比丘所學故說為師依何住者當依四念何謂四念謂觀內身遊身觀精懃一心除世貪憂如是觀外身內外身受心法等亦如是此是所依故經說言若依四念名自境界不為魔縛若住五欲名他境界為魔所縛惡性比丘云何共居者梵檀治之言梵檀者嘿不共語若心調伏為說離有無經一切經首置何字者當置如是我聞一時佛在某方某藂林等由佛教置故有此言第二門中言立意者雖知此言是佛教置佛本何意教置此言為生物信云何生信言如是者阿難顯已信順以語令他眾生同己生信言我聞者阿難彰己從佛所聞非自制造以成可信之是何義而為生乎釋言信者入法初門攝法上首凡入佛法要先起信是故經中說信如手如人有手至珍寶所隨意採取若當無手空所獲信有是義故為生之第三門中先解如是後釋我聞解如是中先就人定後正解釋定之云何昔來相傳就阿難解阿難自言己之所傳如佛所說故名為如簡去相似行言是究尋此言乃是就佛非就阿難何故得知准大智論言如是者信順之辭阿難彰己信佛語噵佛所說以為如是又溫室經初阿難自云吾從佛聞於如是故名佛說以為如是但方言不同依外國語先舉所聞後舉如是故知名彼如來所說以為如是定之亦爾解釋云何言如是者解有兩義一約法解二約人解言法者阿難噵佛所說之言如於諸法故名為如說理如理說事如事說因如因說果如果如是一切如法之言是當道理故曰如是良以乖法名為非故如法之言得稱為是言約人者阿難噵今釋迦所說如於過去一切佛說故名為如如諸佛說是當道理故名如是乖佛所說則名非故如佛所說得稱為是此之兩釋共成一義言我聞者阿難對彼未來眾生陳己飡說故言我聞聞實是耳何故稱我諸根之別皆我用具足故就主說言我聞法中元無人何處有主而言就主宣說我聞釋言法中雖無定主非無假者綰御之義亦得稱我故涅槃云譬如四兵合以為軍雖無定主亦得稱言我軍勇健我軍勝彼此亦同然阿難既是得理聖人有何所以同凡說我釋言阿難雖復說我不同凡夫云何不同說我有三一者凡夫見使未亡見心說我二諸學人見使雖除慢使猶在慢心說我三無學人見慢已除值世流布宣說言我今阿難結集法時身居無學見慢已除隨世流布宣說我聞故不同凡無我是勝真諦所收有我不如世諦所攝何不從勝宣說無我從劣說我化我眾生法須如是若不須說我何由可得標別故此令人識知故須說我乃至諸佛化我眾生例皆同爾一時已下義雖兩兼今且對前一向證信自下偏就發起以釋於中處二人別有五文別有三言處二者一異處赴化序在舍衛玄起彼化二當處赴化序佛往踰闍欲為說經諸經之中多有此例言人五者謂佛化主王及夫人栴提勝鬘五人影嚮共為發起文別三者一明佛化主二王與夫人是生信時釋此一時略有三句一序異說二辨其非三顯正義異說如何昔來相傳佛說時阿難聞時無先後簡去傳聞之謬成上我聞故云一時異說如此次辨其非先以事驗後以文證如何如經中說阿難是佛得道夜生彼小乘中佛成道已過六七日即便說經若依大乘過二七日佛便說經阿難爾時由在懷抱身不預會如來成道二十年後方始出家三十年後方為侍者自斯已前所說諸經多不親聞雖不親聞而所集經並云一時驗之定非簡傳之辭又小乘中不得說言阿難是權明知非是聽說一時云何得知阿難是佛得道夜生為詮此義須知阿難字立因緣阿難陀者是外國語此名歡喜喜有三義一以本因佛於往昔見過去佛號釋迦文侍者弟子名曰阿難國土眷屬與今無異因即發願願我當來成如今佛以斯本願侍者弟子今字阿難二以現緣阿難端正見者同喜改號歡喜三父母立字父母何緣以字歡喜喜時生故何者喜時佛得道時如來十九出家三十成道既出家已五年習定六年自餓父王遣人恒往瞻伺知極羸惙常恐不全菩薩後時知餓非常受食乳糜欲取正覺魔作是念若佛成道空我境界聞道未成當敗其志造率官屬十八億萬來嬈菩薩菩薩爾時入慈意定令魔眷屬顛倒墮落魔既被降便作是念菩薩力大非我能勝當惱其父遂即往詣淨梵宮上唱如是言悉達太子昨夜死矣王聞是語從床而墮猶若魚王熱沙所爍良久乃甦念子在家當為輪王何期出家空無所獲未久之間菩提樹神以佛道成遂持天華慶賀父王淨飯宮上唱如是言地天太子昨夜成道明星出時降魔兵眾得成佛道故以天華用相慶賀王聞生疑向者有天言我子死今復有天云子成道何者可信菩提樹神曰我言可信向者是魔故相惱其王聞大喜念子在家當為輪王今日出家為法輪王彼此無失前聞子死念忽聞洛一重大喜復聞道成兩重大喜未久之間王弟斛飯夜生阿難晨抱詣王弟於昨夜生一男王即報言我子成道汝復生男眾慶集與字歡喜以此推驗阿難定是得道夜生何由得言聽說一時事驗如此文證如何依轉法輪經阿難比丘結集法時在前結集轉法輪經口自稱云佛初說法時爾時我不見如是展轉聞佛遊波羅捺為五比丘眾轉四諦法輪據斯以驗阿難自言己之傳聞不云親承然彼經首亦言一時明知一時非簡傳聞辨過如此正義云何言一時者化辰曰時如來一代化時眾多為別餘時是故一言何故得知此言屬下依華嚴經十地品初說言爾時佛在他化龍樹別傳改爾為一爾時之言不可成上改爾為一寧不屬下故知一時定非成上所言佛者標其化主於王夫人是所信人佛外國語此翻名覺覺有兩義一覺察名覺二覺悟名覺言覺察者對煩惱鄣煩惱侵害事等如賊唯聖覺知不為其害如人覺賊賊無能為故名為覺言覺悟者對其智鄣無明昏䨱事等如睡聖慧獨悟如睡得悟故名為覺所對無明有其二種一性結無明迷䨱實性對除彼過覺法實性故名為覺二事中無知於事不了對除彼過覺知一切善惡無記故名為覺故地持云義饒益聚非義饒益聚非義非非義饒益聚平等開覺故名為佛既自覺復能覺他覺行窮滿說之為佛言其自覺簡異凡夫云言覺佗彰別二乘覺行窮滿顯異菩薩是故獨此偏名為佛住舍衛下明起化處於王夫人生信處住舍衛國就寬通舉此云名聞其識名為舍婆提此從人稱自古昔有人兄名舍婆弟名婆提兄弟二人共造此城是故名為舍婆婆提祇樹獨苑隨處別指此是寺名祇者是其祇陀太子給孤獨者是須達多長者此人恒常給飢貧因以呼之為給孤獨二人和合共造此等共造因緣廣如經說佛初成道在摩竭國未來舍衛須達長者因行摩竭到王舍城寄止一家其家明日欲請如來極夜怱怱須達問之為當欲請摩伽陀主為當欲作歡樂吉會怱怱如此主人對曰我不請王亦不餘會明欲請佛是以怱怱須達宿世值佛因緣初聞佛名身毛為竪即問主人云何主人以是佛德答之須達渴仰求見心猛夜覩天明進詣佛所佛為說法道悟初果請佛夏坐佛知舍衛多善眾生須往攝化即受其請佛時告曰出家好靜長者須知須達欲為如來造寺不閑造法請將舍利往彼授佛時聽許往不見寺地都無好處唯有城南一千步外道西之中有王太子祇陀之苑足八十頃堪造佛寺遂𠗦買之祇聞不肯過聊不以祇陀戲言若能側布金錢滿地當可相與須達喜諾天當取金薗地屬我祇陀對言我苑不賣須達告諍告諍不請官決之首陀會天恐畏餘人敬領太子隨情曲判即自化身為斷事者依法正判苑屬須達祇陀取金𨒬既判已須達輦金布其地布之欲滿唯五百牛在須達支思不知當出何藏金足祇陀謂思悔遂告長者若悔相聽何故思量須達對曰為佛造寺何計金寶但自思念不知當出何藏金足祇陀即念所為之佛必有大道致使斯人輕寶乃爾表者宜止已布之金可為苑價未布之地我為殖樹須達敬從是以此寺名祇樹給孤獨薗如來金時遊化在此是故言住法身無方示化有託故言住耳時波斯匿王下是第二段明王夫人於佛得信作書告女於中先明王與夫人於佛得信共相謂下作書告女前中波斯匿為舍衛主此云月光末利是其波斯夫人本字黃頭從末利薗得此人因薗立稱故號末利得之因緣如經廣說此人本是舍衛城中耶若達家守薗之婢於一日中請食守薗路值如來入城乞食黃頭見佛相好具足發信敬心念言我今奉猷飯食或見哀受遂往求施佛時許之當施食時即自要願願脫婢使為王夫人其時值王出田遊獵天時暑熱遙見黃頭所守之薗藂林茂馳往奔之王馬駿快在前而至黃頭見王迎接扶下引至凉處敷衣請坐隨王所須巧稱王心王問伱是誰家之女黃頭實答王具問已將從始至王遣使人呼耶若達達至王問是卿何親達答是婢王令索價達時答王直爾奉王乞不取價王言我今娉為夫人不得虗爾達時遂索百千兩金王即與之香湯洗沐衣夫人服王與同輦載之還宮王極寵厚五百夫人中得為第一故今舉之此能信人言信法者先事外道今始歸佛信於佛法故言信法何緣得信如經中說末利夫人因獻佛食得脫婢使為王夫人常自思念何緣得爾豈不由昔施沙門食得此福報即問左右頗曾見有如是人不傍人對曰此應是佛今在祇薗末利聞已辭王禮觀佛為說法遂得深信因信勸王王心未迴後因十七羣童子比丘入城乞食食已出城水中遊戲王與夫人昇樓遙見語夫人所事正爾何足可尊勸我令信夫人有愧當於是時十七群中寂大之者在先出水觀察向來諠戲太過將不生於世人譏嫌為此觀時見王豈挊疾呼同友汝等速出向來諠戲生世不善各現自力除王不信諸人遂即出水著衣端坐入定發通飛行游王殿上夫人先見告王令知年少能爾何況耆宿王見信敬遂往佛所佛為說法得正信解名為信法問曰是中為信大法為信小法釋言之中但云信法不分大小不可輙定以今初信望後作書時中不遙故云未久自下作書告女之中初先籌量王及夫人與勝鬘下正名作書籌量中有㹅有別共相謂言是其㹅也謂是告辭以言相告故曰相謂勝鬘下別於此別中先發言夫人後述言有四一噵勝鬘是我之女彰己諳委二聰慧下欲其根性明可開曉三若見佛下彰見佛有宜四宜時下明須告發初中勝鬘樹其所言夫人者勝鬘是其波斯之女適配踰闍為友稱夫人夫人是其之美號故從彼國說為夫人是我女者彰諳委明堪入法是二句中細分有六一聰二慧三者利根四通五敏六者易悟前三直歎後三重顯知事名聰解義稱慧於此二中易可開曉名為利根通顯前聰有人聰不覺無知今明勝鬘愽練五明聰而廣通敏顯前慧有人有慧不必明了今彰勝鬘有慧不必明了今彰勝鬘有慧能明故名為敏敏猶明也言易悟者顯前利根有人利根憘為專執今明勝鬘情性箄盡逢勝必從稱曰易悟第三句中見佛必解明能解也心得無疑明能信也第四句中宜時遣者善時難遇故宜及時遣信告也因告見佛生其善心名發道意此㹅相言不分大小上來王語夫人白下末利述可上來籌量下正書告句別有三一作書嘆佛略讚如來無量功德者一紙之書言為能窮德故云略讚言雖約略攝德寬廣名讚如來無量功德如是如理乘如實道來成正覺故曰如來功謂功能諸行皆有潤益之功此功是其善行家德故云功德如清冷等是水之德二即遣使持往言內人者是其閹人又云石女女人不產名為石女如來曾有因緣經中波斯匿家有五石女聽黠巧便堪可駈使當應是彼何故遣此內人為使宮閣之使非內不通是以遣之名栴提羅出其名諱依外國語四名相通一栴提羅此奄人奄人猶是中曹人也二扇提羅此名石女三栴陀羅此云魁膾四栴荼羅此云名月若此正名為栴提羅即是奄人若當正音名扇提羅翻譯者謬名栴提羅則名石女三使人下使至奉書至阿喻闍國入其宮內明使至也踰闍梵音此云無生此國往昔大乘人住多解無生國從人稱故號無生下奉其書言敬授者勝鬘即是栴提大家跪而奉書名為敬授勝鬘得下是第三段明其勝鬘得書知世有佛請佛說經於中有四一明勝鬘得書知佛二向栴提下說偈作請三即生念下如來赴就四勝鬘及下覩佛設敬前中細分乃有四句一見書歡喜女在他國得父母信豈不歡喜二敬以頂受外國之法得尊長書先以手受次置頂上顯已受即然後尋讀勝鬘如是故云頂受三開書看文名讀闇詠稱受領納曰受慍守曰持四生異想此書論云改異常信故明怖心第二段中向栴提說經家序列栴提是其父母之使量之說偈如對父母故對說偈何故揭誦釋有兩義一偈言巧約少字之中能攝多義勝鬘欲以略少之言攝佛廣德故為偈頌二偈言義妙諸讚嘆者多用偈頌勝鬘為以微妙之言述讚佛德故須偈誦下宣偈辭於中初偈審定書言後偈默請就初偈中我聞佛聲領書所告向來勝鬘用眼讀書不曾可聽何故言聞釋言根葉有相助義前王夫人作書告女以身表口勝鬘讀書以目代耳故曰聞矣佛在舍衛勝鬘未覩何得已言我聞佛聲此聞書中噵佛名聲非聞佛語名聞佛聲所未曾有述書所讚如書所嘆在世全無故言未有所言真實者審定書言前言勝鬘利根易悟今此得書何故疑惑不即領受釋言事有難信易信世事易信出世難信今書所傳世在未有故須審定又復勝鬘是聰慧人凡所得事審而詳信不同愚人望直專信應當脩供養量息許稱量栴提傳書之恩明合供養不噵如來故明本云是言若真實我當與汝衣第二偈中半偈測佛慈普明不簡已下之半偈以理要請下情惻上名曰仰悟佛具眾德為世欽重故號世尊書中嘆佛言佛慈等故言普為噵佛普為明不簡己所為眾生在於時中為為世間非器世也言亦應者以前世間類己名亦慈在如來未敢自專故言亦應上心慈下名垂哀愍請心決施故言必令我得見也第三段中初之半偈乘請赴就下之半偈放光令見即生念時牒前起後謂前勝鬘仰惟時也空中見者有請宜赴是故須現如來示化受丈夫形宮閣之化無宜輙在故雲中現言普放者釋有兩義一普身放光故名普放二光普照故云普放淨光明者釋有兩義一光體無暗名之為淨二就所照能令眾生雜欲怒癡故名為淨顯無比者以所放光顯己身相令彼見也欲赴勝鬘願求之心故須顯之第四段中勝鬘眷屬標其敬人頭面接下顯其敬相頭面接禮是身敬也頭是己尊足是彼卑顯敬慇至勝鬘在地如來在空云何得接此據內心運想言耳咸以淨心是以敬也咸是皆義淨是信義明前勝鬘及與眷屬皆於所起淨信意名清淨心嘆佛實得是口敬也此言實者兩義一稱書名實二德依理成名出情妄故名為實也自下第二是其正宗正宗之中章別十五始從嘆佛終至勝鬘師子吼章此十五中前十四章是其自利後一利他前十四中初十三章是一乘法後一就人明信利益前十三中初有五章是一乘行法後之八章是一乘理法蓋乃經論所說大同如涅槃經初說慈悲不殺等事明其行德四淨四倒如來性等彰其道理如維摩經初說慰喻調伏等事是明其行不二門品復彰道理如地持論初自利利他還明其行後真實義品復說道理良以菩薩行依理成故說行後多皆明理理者所謂非有無如實法性云何依乎菩薩是法非有非無見非有故不著有邊見非無故不住無邊不著有邊即非垢行不住無邊行非淨行故經說言非垢行非淨行是菩薩行又復菩薩不著有故不同凡夫則非凡行不住無故不同二乘則非聖行故經說言非凡夫行非賢聖行是菩薩行此等皆由證理故爾故辨行後多皆說理就前五章明行之中初四是其一乘之因後一是一乘之果就前四中初之一章明菩提起行根本後之三章明菩提行行中十受持戒雖過三願攝受造行善法善中三願是世間行攝受出世就一乘行德之中有此五章就初章中四句釋之一釋章名此章名為嘆如來真實第一義功德如來功德證理以成是故名為第一義功德德絕情妄稱曰真實勝鬘於此以言嘆美故名嘆德二顯來意此章嘆佛完顯發心云何顯發凡是世人情所憎惡發言毀呰內心願求與言美嘆今此勝鬘內求佛德是故讚嘆舉嘆為顯內心願也何故明願願是行本故須明之三解次第何故先明嘆佛功德釋有兩義一乘前便故先明之云何乘前勝鬘前請如來赴就因見即嘆故先明之二生後之便菩提之心為諸行本能生後行是以先論四分文釋此章有二一嘆佛德明所願求二哀愍下彰其發心乘前所見故先嘆佛文有五偈初四別嘆後一結嘆如來廣德非不彰故先別嘆非別能盡故後結之前別嘆中初有兩偈嘆其法身次有一偈嘆其解脫後之一偈嘆其波若三事之義如涅槃章其廣分別此應論之三中何故先嘆法身乘前所見故先嘆之尋身有本所謂解脫解脫有本所謂波若如生死中在報依業業依煩惱前法身中應先廣釋三佛之義廣如別章然後釋文文中初偈嘆其應身後偈嘆真乘前所見故先嘆應尋應有本故後嘆真前嘆應中偈有四句初三正嘆後一結敬前三句中玅色正嘆汎解妙色有其二種一者精妙來相好精勝過世二者圓妙法界色像無不悉現猶如淨色摩尼寶珠眾像悉現故稱為玅今此所論是精妙色次有兩句寄對顯勝無等無比過世色相他不能齊故曰無等他不能似故無比言不思者過世心想世情弗測故曰不思言不議者過世言相言不能宣稱曰不議問曰應身與情相應云何說言不思議乎釋言麤應凡亦能見精妙之應十地乃覩非世能知是故說為不思議也是故今敬禮總以結敬佛德如是故今禮也就嘆真中偈有四句初三正嘆後一結敬就正嘆中初有兩句嘆佛報身報中無出功德智慧色無盡者是其功德無盡之言汎釋有二一常無盡真身常住無有遷易二廣無盡諸根相好皆遍法界問曰若眼遍充法界餘根相何處安置釋言真身是法門身不得如彼世間色像差別求之是義云何若入眼門眼遍法界諸根相好及佛國土悉眼中現若入耳門耳遍法界餘根餘相及佛國土皆耳中現如是諸根諸相及佛國土一一皆爾由如大海一相皆遍亦如虗空無為不動無礙寂靜一切皆遍此亦如是同體周遍故不可窮極故曰無盡今此所論是常無盡與後文中常住義同有人說言真身無色是不所不應如經中說菩薩廣植相好之因如何無果復如地論宣說如來相好莊嚴為實報何為不信又復如彼大涅槃云捨無常色獲得常色受想行識亦復如是小泥洹言妙色堪然常安穩不隨時節劫遷大聖曠劫行慈悲故得金剛不壞身此文之中說色無盡當知皆是顯真之謂不得言真身無色人家所以說真無色懼色是礙若爾何不懼心是緣說佛無心佛無緣心而有無緣不動之心佛無緣不動之心佛無礙色何為不有無彰礙色問曰無礙云何名色若爾佛心亦無攀緣云何名心彼雖無緣而有所知故得名心佛雖無礙而有法界諸根相好何為非色智慧亦然是智慧身慧同前色常住無盡故曰亦然一切法常是法性身如來藏中恒沙佛法顯成今德名一切法皆即真心不離不斷不脫不異故曰常住常住猶前無盡義也此三句中初云無盡後言常住蓋綺互耳齊類皆得是故結敬前言敬禮此云皈依文綺互耳嘆解脫中偈有四句前三正嘆後一結敬就正嘆中降伏心過及與身四種明其所離謂離十惡降伏心過即是遠離意三邪也及與身者離身三惡偈文迮故略不云三及四種者離口四過亦以偈迮略不說口離前詠後是以言及問解脫有過皆捨何故此中偏言離業耶答分相慧除煩惱解脫免業法身離苦故今解脫偏云離業已到難伏地彰其所得無上涅槃是難伏地佛已到之是故結敬禮法王者佛具諸法於法自在故曰法王解脫王義故此論之嘆波若中偈有四句前三正嘆後一結敬前正嘆中嘆三種智一一切智能知一切世諦諸法二無礙智於世諦法知之自在三清淨智證第一義此三廣釋如地持論知一切爾炎是一切智爾炎相語此云智母又亦名為智境界矣五明等法能生智解故名智所依名有境界如來悉智慧身自在是無礙智於諸法中不假方便任運能知故云自在攝持一切是清淨智如實法性是一切法明證在心故曰攝持結敬可知諸偈結敬齊應相似文綺互故異上來別嘆別嘆難窮下結顯多偈中四句前二結用後二結體就結用中言過稱者出言分齊後結體中無邊法者證窮法界難思議者妙出情分此乃諸佛滅觀真德緣心不及名難思議佛具此德事合受仰故並言禮上嘆佛德下明發心文別有二一略明發心二我已作下廣明發心略中初偈諸佛䨱護後偈佛許前中初句正請䨱護言哀愍者請佛哀憐䨱護我者謂佛攝化䨱我增善護我離過故言䨱護令法種增出須䨱事勝鬘上來嘆佛之善及求佛心能為未來法身種子名為法種願佛䨱護令得增長下有兩句出須䨱時此世現在後生當世於此二世願佛常攝過去已往不須䨱護是以不請下佛許我久安汝前世開覺過去攝也化起福德名為安立導生智慧稱曰開覺今復攝也未來亦然後世攝也勝鬘向者但請現未如來何故許其三世此舉過去證其現在未來必然非許過去第二廣中文別有二一開勝鬘乞記方便二佛於眾中下如來與記前乞記中初先口乞後明身乞前口乞中我已作者牒已過善現牒現善餘牒後善上來別牒如是眾善總牒二世唯願見攝正是乞辭唯謂專也勝鬘之意專求攝受故言唯願見攝受者將有兩義一求望之辭如似世人求他之時語言仁者願顯將理此亦似彼如維摩經中亦有此例彼處維摩取無動界安置此土彼國天人白無動佛誰取我去願見救護此言似彼二照矚之義願佛宣說當來攝相令我照見名見攝受上來口乞勝鬘眷屬頭面禮佛是身乞也向前口乞今復身禮彰己內心專專之至至問曰勝鬘行因得佛自是常理何須乞記釋有兩義一者自為覩果行因求心猛勵是故須乞二者為佗因乞記故下攝多人同生其國是故須乞為疑故須乞記疑者嘆佛從虗終無得果釋疑可知下正與記於中初明如來與記諸有終下明記攝益前與記中有總有別佛於眾中即為授記是其總也勝鬘行因記得當名之為記聖說授與目之為授汝嘆已下是其別也汝嘆如來真實功德牒前善因以此善下禮其當果於中有二一記學子二過二萬下記無學果就學果中當於無量阿僧祇劫天人之中為自在王是初地上攝報果也無量阿僧祇劫舉其時分此無量者依華嚴經是其一百二十數中一數之名劫者猶是時之別稱天人已下是其果體勝鬘未來形遍六道無所不就勝言耳生處見我當供餘佛是初地上調兼行果此即彰己攝受之相當復供下約對餘佛明調兼行無學果中初明正報後辨依果前正報中言過二萬阿僧祇者辨其時分問曰前說無量僧祇今言二萬阿僧祇劫為一為異釋言當應無量之外更過二萬阿僧祇劫方得作佛問曰菩薩種性已上度三阿僧祇便得作佛今云何言無量僧祇為自在王復過二萬阿僧祇劫方得作佛釋言劫有大小故爾如地持說劫有三種一日月歲數無量名阿僧祇劫二十劫無量名阿僧祇劫如賢劫等此劫大小如龍樹辨說四千里城滿中芥子一槩令平百年去一其芥子盡劫猶不盡三大劫無量名阿僧祇何者大劫若依雜心如賢劫等六十四劫名一大劫何故定數六十四乎從初火劫終極風劫有六十四是義云何故壞劫火多水次風為最小七火一水過七水已更過七火方有一風如是合有八七火劫一七水劫并一風劫為六十四亦可數彼賢劫等劫至不可數為一大劫劫別如是言種性上三僧祇者是其大劫今論中劫彼此不違當得作下是其果體先明作佛號普光等辨其名諱佛名有二一通二別論其別名諸佛各異或有從其種姓為名如迦葉佛釋迦佛等或從光明如定光等或從聲名妙音等或從壽名如彌陀等或從目名如燃燈等或從喻名滿月光琉璃光等如是非一語其通名諸佛齊等佛德無量依德施名名亦無邊住中據要略論十種所謂如來應供正遍知乃至佛世尊十號之義廣如別章此應具論今此文中號普光者是其別名由前見佛普身放光起心願求故成佛時名曰普光下如來等是其通名如來即是如來之號應者即是應供之號正遍知即是遍知號餘略不論下記依果果謂淨土淨土之義廣如別章此應具論然土有三一法性土一切國土本性清淨法界諸義同體相成猶如帝網凡夫於彼清淨土中妄想覆心自累成隔唯見鄣礙事別之土後除妄想隔礙之心本隱淨土顯為我用名法性土二實報土廣修淨因得勝境界微妙第一諸相莊嚴皆遍法界如海十相不同世人所見之土彼此隔礙三圓應土如淨寶珠青黃赤白無鄣礙現今此所記是其應土應淨土中有三莊嚴一五欲莊嚴一切色香味觸等微妙精勝二法莊嚴具諸法三人莊嚴勝善眾生居住其中今具有之就此文中麤分有二一明所無無惡因果二明所有有善因果細分有四一無惡果二亦無下明無惡因三彼國下明有善果四彼諸下明有善因就初句中彼佛國土無惡趣者無三途苦無老病衰無人中苦老病可知中年交裘名為衰惱彼皆無之無不適意無天中苦無之一字貫此諸句第二句中言亦無者前無苦果兼無惡因故言亦無殺盜邪婬乃至邪見是不善業尚無惡名焉有惡體第三句中彼國眾生謂人與天翻離惡趣色力壽命翻前老等色翻前老老侵壯色故翻之力翻前病病奪強力故翻之壽翻衰惱衰夭長壽故壽翻之五欲眾具皆悉快樂翻不適意勝於他化顯快樂相勝有二種一者精勝始他化天比人五欲昇降非並淨土五欲望他化天優劣亦爾二受用勝穢土五欲受用生所淨土五欲受用生道如香積飯今此所論是精勝也第四句中彼諸眾生純大乘者彼妙淨土無雜學也上來與記下明攝益諸有修習善根眾生皆集彼者起眾心恐人間勝自絕不往故諸有脩善集彼勝鬘夫人得授記下諸人願生世尊記下佛記皆生定其去心自下第二明十大受章於中略以四句釋之一解章名此章名為不思議大受菩薩戒廣釋精深難測名不思議非餘能加目之為大為心領納稱之為受二釋來意前章求佛佛由戒成故須明之解次第前明嚴心自下起行行初難遇是以次論四分文解釋此章有二一自受戒二離佛下為他要瑞自中有三一受戒方便二受十下正明受戒三法主下請佛證知初方便中聞受記牒前起後恭敬而立正是方便何故立受有人釋言𠰚將行相若爾坐受豈爾不行當知受戒坐之皆得不應異釋今此正以佛在空中勝鬘在地仰對如來立言是便是以立受非直此立餘章皆爾若爾向前受記之時何故不立彼自不言聽受佛語伏聽亦便是以不起下正受中有總有別受十大受是其總也下十戒法深廣名大為心領納目之為受勝鬘要期受彼大受名受大受世尊下別別中廣論戒法難窮今據一門且論十種十中前九受世教戒第十一種受正法戒於世戒行要期領納名受世戒於證理行要期領納名受正戒就前九中初一律儀次四攝善後四攝生此三猶是地持論中三聚戒也三聚之義廣如別章此應具論就律儀中言尊者啟白所對次使如來知己所受堅固持心故須啟白我從今日乃至菩提要期分齊今日是期要期分齊今日是其要期之始乃至菩提要期之終此即不同凡夫聲聞形俱等戒於所受戒是所受法不起犯心是要期意謂於所受律儀戒中不起犯心尚無犯心為有事犯攝善戒中初句除慢第二除嗔第三除嫉第四除慳煩惱無量以何義故偏說此四此四重故故地持中說此四種為波羅夷四中初一對上除慢明攝智慧後之三句於下能益明攝功德前攝慧中於諸尊長是攝法處有法之人是菩薩尊不起慢心是攝法行下三句中初句可知第二句中於他身色正報也及外眾具他依報也勝鬘於此皆無嫉心有嫉心者不能勝益是以不起第三句中言於內者自己正報言於外者自己依報前言他身及外眾具此云內外文左右耳勝鬘於此常有捨意故無慳心攝生戒中前二是其攝取之行後二是其救拔之行攝取行中初一與樂後一授善前與樂中不捨惡人略明不捨二我得力下廣明不捨三何以故下釋不捨意略中捕養眾惡律儀是純惡者所謂捕魚捕鳥養者所謂養豬養羊養雞養牛捕養亦是律儀之餘分屠殺等事別非一不可別舉是故通言眾惡律儀惡法名律無作之罪合此律戒故號律戒故號律儀律儀多少經論不同依涅槃說有十六牛羊豬雞為利故養肥已轉賣即以為四為利故買買已屠殺復以為通通前為八捕魚為九捕鳥為十獵師十一劫盜十二魁膾十三兩舌十五呪龍十六依雜心論說有十二屠羊為一養豬為二養雞為三捕魚為四捕鳥為五獵師為六作賊為七魁膾為八守獄為九呪龍為十此十與前涅槃經同屠犬十一伺獵十二此二異前及諸犯戒是雜惡者勝鬘於此終不暫捨第二廣我得力時求其化能謂求天龍鬼神力等前拔苦中何故不爾釋言拔苦理亦須力但今為明拔苦與樂人皆樂從不假強力降惡授善違情難作人多不從故求強力於彼彼處見此眾生㯹牒所化惡者非一故稱彼彼應折伏下正明化益不捨義也剛強應伏伏令離惡等濡應攝攝令住善第三釋中初問次釋後總結之何故問也菩薩正應隨順物心何故求力折伏眾生強攝取乎釋有二一為法住二為眾生成就善利以攝受故令法久住是第一句折伏攝受令行佛法法流不斷故得久住者天人充下是第二句天人充滿惡道減少如來所轉法輪由法久住依之常習故得隨轉見是利下總以結之見是法住成就世間出世利故救攝不捨名前折伏以為救耳自下第二受正戒中初明勝鬘自誓要期攝法不失理是正法證法在心名為攝受一證常然名不忘失下廣釋之何故問也不攝何過攝有何利不得忘失下對釋之初先反明忘失之損後順明其不忘之益損中先別後總結之別中六階從上向下次第論失忘失法者則忘大乘是第一階謂失佛果諸佛果德大人所乘故云大乘乘依理成理是正法忘正法故不成彼乘是以言忘忘大乘者則忘波羅蜜是第二階失十地行十地所行名波羅蜜忘失正法自為己受畜財物明不為己凡受為貪彰為他人問曰此與後四攝中布施何異而須別論釋言今此直與財樂後四攝中布施攝者誘令修善故須別論下授善中不自為己行四攝法明不為己四攝之義廣如別章此應具論為一切下彰為他人為一切生內心平等以不愛下離於不等眾生有三謂怨親中不愛染者於親人所離偏親過無厭足者於中人所離懈怠過無礙心者於怨憎所離鄣礙過離此三過尊攝眾生就後二種救拔行中初一救苦後一拔惡前救苦中初彰悲深於苦不捨後顯悲益要拔乃捨前中孤獨無救苦也無父名孤無子稱獨言幽繫者繫閇苦也重窂曰幽枷璅名繫言疾病者違損苦也種種厄難困苦生者謂餘一切所有苦也於此諸苦終不蹔捨下顯悲益要拔乃捨必欲安穩以義乃饒益離苦對治安穩樂因出世聖道永絕危怖故曰安穩義益樂果無上涅槃義利眾生名義饒益決意與之故曰必欲令脫眾苦正離苦體令彼眾生得樂滿足離苦畢竟然後乃捨下拔惡中句別有三一者非直失彼佛果大乘亦失十地波羅蜜行波羅蜜義後當釋之忘波羅蜜者則不欲大乘是第三階失初地心初地發心求佛大乘名欲大乘忘正法者非直失彼波羅蜜行亦失初地欲大乘心不決大乘則不能得攝正法欲是第四階失解行心不決大乘猶前文中不欲大乘欲於大乘決定趣向故名決定解行發心求初地上攝受正法名攝正法欲忘正法者非直失彼初地之中決定欲心亦失解行攝正法欲則不能得隨樂入者是第五階失種性心前一不能括通此句樂入猶前攝正法欲前正法欲於初地上攝受正法願樂趣入故名樂入種性所行隨彼樂入名隨樂入忘正法者非直失前解行地中攝正法欲亦失種性隨入行永不堪任越凡夫地是第六階失種性前喜趣任中修習淨信能越凡地忘正法者非直失前種性隨樂亦失善趣故不堪任越凡夫地良以諸行皆依理成故忘理者諸行皆失此皆應得不得名失上來是別我見如是無量大過總以結之大過如前上來反明忘失之損又見已下順明菩薩不忘之益勝鬘前觀忘失之損今此重觀不失之得故云又見言未來者據今受時說後行時以為未來攝法菩薩舉證法人墮位別分地上之人名為未來攝法菩薩攝法之位在地上故就行通辨始從善趣終至法雲有證理者通名未來攝法菩薩何故如是前忘之損體通上下翻損彰益理亦應然菩薩胡音此云道心眾生良以此人內心懷道又用道成故名此人為道眾生問曰三乘賢聖心皆有道並用道成故唯此獨稱菩薩釋言為分賢聖故爾等分賢聖何故此人偏名菩薩釋有三義一以願心望果分別唯此眾生求大菩提餘皆不求是故獨此名道眾生二以解心望理分別凡夫著有二乘住無唯此菩薩妙捨有無契會中道是故獨此名道眾生三就行分別佛法有三一教二義三者是行教淺義次行為最勝聲聞軟根從教為名聲者是教飡生教解故名聲聞緣覺次勝從義立目緣者是義於緣得解名為緣覺菩薩最上既行為名以脩自利利他道故名道眾生摩訶胡音此云名大大有三種一者願大願大菩提二者行大廣修諸度三利眾生大四攝等益無量福利是其所益翻上可知始越凡他終至佛果名無量利故受大受結利歸本利由受成是故受之於此十中此受最勝故名大受上來第二正明受戒自下第三請佛證知何故須請為堅持心云何堅持由請佛證固而不犯法主世尊啟告證人佛證諸法為人顯示處學出佛是故名佛以為法主主故須請現為我證正是請辭釋有兩義一就身說現佛身現在為我作證故言現證二就心說現佛於諸法現知見覺證我所受心定能行故云現證地持論言諸佛大師於一切生一切諸法現知見覺知某菩薩於我某前三說受戒同此後義上來自下受自下第二為他要瑞難佛現知簡所不知辨知兼疑是故云難而眾生下就所為人名之要瑞於中有六一明所為安彼下正為要瑞三說是語下如要相現四彼見下明其大眾觀相除疑五而發願求同六世尊記下佛為記之初中有二一恐眾生疑惑敗善故為要瑞二彼或下恐彼眾生舉疑惑人善根㣲薄生疑所由或起疑網明疑惑心生疑不定是故言惑疑心難出如魚在網故言疑心難出如魚在網故言疑網疑謂勝鬘有言無行以十大受極難度故生疑所以度之言到十受深度難到窮處勝鬘言到是難可信故生疑也下失樂中言彼或者前疑不定受果亦然故復言或生死昏寢說之為夜輪轉無際是故言長以疑惑故受苦失樂名非義益不得安樂顯非益相第二段中為彼故說誠實誓總有明要端此十大下別明要瑞先要雨華後諸妙聲何故要此有人釋言華能感果表己所行必能得果聲能詮表彰己能行故要此二或可如此人此要瑞示於耳目雨天妙華有目皆覩出天妙音有耳同聞是以要之第三段中雨眾天華赴前所要出妙聲者赴後所請此等誰現或是佛力或是法力或是諸天善神之力第四段中彼見妙華及聞音聲疑惑除者信知勝鬘受如行也喜無量者前疑勝鬘受而不行自絕覺心今以勝鬘為我要瑞除我疑心我得同行無上佛法失而還得是故歡喜第五段中常共俱會願同生也同其所行願回行也第六段中世尊悉記一切大眾如其願者顯彼大眾願同心也自下第三明三願章四句釋之一解章名此章名一切願攝大願章蓋乃順於外國人語若順此方應云大願攝一切願於出世道悕求名願願廣名大此三願中緣收法界恒沙等願名攝一切二釋來意何故須辨前者發心求大菩提菩提之果必由行成行因願起是以論之三解次第何故次辨前明十受持戒離過次宜行善行善世間出世間別三願世間故次論之問曰世間善行非一今此何故偏言願乎釋言願是集善之首今此勝鬘進善之初故偏言願又復願是眾行之主就主以論故偏說願又此於彼出世間道趣求心猛故偏說願雖復說願諸行皆隨四分文釋之此章有二一明勝鬘發三大願二如來述讚前發三願即是大願後佛述讚明此三中廣攝多願即是大願攝一切義前中勝鬘復於佛前發三願者經家總舉言爾時者舉發願時言勝鬘者舉發願人復於佛前舉發願處前受十受今更起願是以言復發三願者正舉願心汎解發義有其四種一先未生心今忽起意是故言發二先已生心今彰在口是以言發三先有願心今起行意是故名發四先修行心今始得證是以言發今此發者就而言耳勝鬘現在創起要期名發三作是言下寄言顯心別明三願即是第二發彰在口名發三願三中前二是求因願後一攝果前求因中初求地上自利行德耳而作是言以此實願安慰無量無邊生者牒前起後前受十中為安眾生發誠實誓要求瑞相名為實顛安慰眾生今此牒之以此善根於一切生得正法智者正是願體用前實願安生善根願得地上一切生中攝正法智彼生非一名一切生證如實慧名正法智是名下結第二願者求初地上外化行德我得智已牒前起後明化所依以無厭心為眾生說者是化願體是名下結也第三願中我於攝受是捨得處捨身命下正是願體捨身命財者求所離也然此非是用身命財布施名捨清淨得法身捨離無常身命財等故名為捨與涅槃中破壞一切諸結煩惱及諸魔性然後要於大般涅槃放捨身命其義相似護持正法者求所得也然此非謂降伏惡人興通聖教名為護法蓋乃證法在已不失名為護矣是名下結下佛述中初法次喻後合下結爾時世尊即記三願是法說也記三是大是故言記如一切下是喻說也菩薩地前趣向初地脩起法界微塵等願趣入初地所起多願皆入此三如一切色喻多願也悉入空界喻入三也如是下合恒沙諸願合一切色悉入三願合入空界此三真大結嘆也自下第四明攝受章於中互以四句釋之一解章名此為說不思議攝受正法理是正法證名攝受攝受真德妙出心言名不思議勝鬘於此寄言標顯名之為說問曰前來何不名說至此偏論釋言應齊但初章中嘆即是說故不言說十受三願是其勝鬘自分行心非是汎言故不名說今此攝受是地上法勝鬘地前玄談彼法是以言說二釋來意何故須辨前求佛果非證不成故須論之三解次第何故次辨三願世間行世間行滿便論出世故次論之四分文釋之此章有二略二廣從初乃至有大利益是其略餘是廣也略中彰其諸願同入攝受體圓廣中明其出生廣大攝受德備略中初先勝鬘正說後佛述讚勝鬘說中初先勝鬘承力許說次佛聽許後便正說承力說中爾時勝鬘標別說人言白佛言者啟聖求聽言當復者前發三願今更宣說出世攝受故名為復復說在後稱曰當矣承佛威神起所依下稟上力名之為承威神是其力之別稱問曰前來皆不承力今此偏承釋言初章為佛光照即是身加故不承力十受三願自分行心量分而為故不承力此乃宣說出世間法非己心分是故承力又出世法體出名相口名相說其說至難故須承力問曰前是自分行心可須自說出世行德非己分齊何故不令如來宣說勝鬘承力非分強說釋言為增餘人力故云何為增法是深法若佛自說餘人皆言此之深法唯佛能知非我所解正由勝鬘承力說故餘人皆言彼我同類能知能說我亦如是何為不能以有此宜故勝鬘說此與地經金剛藏說增菩薩力其義相似上來承力說調伏願是許說也證心柔輭離諸剛鑛故曰調伏深廣名大光明善根轉增稱願願絕情妄名為真實離此之外更無其行故云無異此猶地經願善決定佛告姿汝者是聽許也是立為化宜在勝鬘任其斟酌故云恣聽自下勝鬘正說之中句別有三一攝別入總亦得名為攝用歸體恒沙諸願皆入一大隨門異辨願有恒沙據體總收無不在中故云入一問曰是中恒沙入一與三願中恒沙入三有何差別釋言前是地前所修攀緣之願攝廣從略今是出世緣智深者明前智慧證理深也言微妙者彰前方便用巧妙也長夜殖善是嘆功德夜同前解有來無始說之為長勝鬘在中殖德本故今能說自下第二歎所說中初明過下後顯齊上來世眾生久種善根乃能解者是過下也何故偏說來世眾生當佛在時賢聖眾多非宜能解亦能行證信解不難是以不論未來惡世聖人隱沒爾時眾生心悟者尠故偏舉之汝說已下是上齊也於中先對餘三世佛彰其上齊我今得下對己所說明其上齊第三段中如是我說攝受功德不得邊者彰己說相成前勝鬘所說善也我說攝受功德無邊勝鬘所說云言真大大與無邊義其不殊是故勝鬘所說名善也第四段中如來慧辨亦無邊者彰己說德成前勝鬘說德為善慧是實慧辨是四辨同前攝受功德無邊是故言亦前嘆勝鬘智慧甚深與我智慧無邊相似方便微妙與我辨才無邊相似是故勝鬘說德名善上來第二隨別廣嘆自下第三釋前嘆意何故問也勝鬘所說攝受正法其為大願有何契當我嘆為善下對釋之釋意如何明攝受中具足二大勝鬘前言真為大願當此二大故我嘆善有大功德自行大也有大利益外化大也自下廣明攝受正法出生義中文還有二一勝鬘正說二於勝鬘說起隨喜下如來述讚勝鬘說中文復有四第一勝鬘承力許說二如來聽許三勝鬘正說四說己仰推勝鬘白佛我承佛力更說攝受廣大義者是初段也前已彰體今復辨德故云更說義謂德義德義寬多故云廣大佛言便說者第二段也勝鬘白佛下第三段也攝受正法廣大義者牒前起後下辨廣義先開三門後廣辨之言三門者即是無量之第一門自行寬廣得一切法是第二門攝果圓脩攝八萬四千是第三門外化具足何者是其八萬四千如賢劫經說彼有菩薩名曰喜王晏坐七日作是思惟菩薩行何三昧便逮致八萬四千諸度法門諸三昧門諸陀羅尼解脫門等過七日已往詣佛所頂禮佛足請前所念佛時對曰快問是義有三昧門名了諸法本行是三昧便速逮致八萬四千諸度門何者是其八萬四千彼經宣說諸佛功德凡有三百五十種門於彼三百五十種德各脩六度以之為因便有二千一百諸度用此諸度對治四大六衰之患便有二萬一千諸度言四大者所謂成身地水火風由前諸度得淨法身故能捨之言六衰者謂外六塵六塵之賊衰耗善法故名為衰由前諸度證諸法空故能治之彼前二萬一千諸度各對眾生四種心患便有八萬四千諸度言四患者多貪為一多瞋為二多癡為三三毒等分以為第四八萬四千諸度既爾三昧解脫陀羅尼等類亦同然今說諸度以為八萬四千門矣三門如是此三是前三願所求初無量者是三願中初願所求得一切法是三願中第三所求攝八萬者是三願中第二所求下廣辨之雲水地藏廣前無量六波羅蜜廣前八萬四千法門捨三得三護持正法廣得一切就初段中雲水地藏四喻何別初一雲喻喻攝受法能生多行第二水聚喻攝受正法能成多位第三大地持擔喻喻攝受法能益多眾第四大地含寶藏喻喻攝受法中脩含多法具此四多故名無量四中前二正設自行以明無量後二約化他字脫顯德無量今此文中宗明自利菩薩化他即是自熟所以辨之就初段中先喻後合喻中應先辨劫成壞然後釋文成壞之相如阿含說文中劫成喻得聖時普興大雲喻攝受體劫初時雲注雨廣多故取為喻雨眾色下喻攝受能生多行雨眾色雨喻生善因及種種寶喻生善果下次合之劫成之言略而不合如是攝受者合前興雲無量福報者合前雨寶福名福報無量善根者合眾色雨法從喻稱故福與善並稱為雨出生廣多故名無量以此廣前無量之門是故所生名無量矣下餘皆爾第二段中先喻後合喻中劫成喻得聖時有大火聚者喻攝受體劫初成時水能廣成故取為喻前將大雲以喻攝受此用水聚以喻攝受下用大地以喻攝受喻雖變改法體不殊出生已下喻攝受能成德位三千界藏者喻所成位三千之義如龍樹說一四天下合以為一數之至千名為小千小千為一數復至千名為中千中千為一數復至千名大千界此三千界成壞同時故合為一隔別名界苞含曰藏四百億洲喻諸位中所成之德三千界中有其百億四天下別名四百億地形各異名種種類東方有渚名弗婆提形如半月人面像之南方有渚名閻浮提其形尖邪人面像之西方有渚名瞿邪尼形如滿月人面像之北方有渚名單曰其形正方人面像之洲謂洲渚此等皆是水中高原故名為洲下次合之次合之初一劫成略而不合如是攝受者合前水聚出生大乘無量界藏者合三千界菩薩地中要唯設十廣則無邊故名大乘無量界藏一切已下合四百億種種類洲一切菩薩神通之力者是其行用一切世間下是其行體行有世間出世間別三地已還名為世間四地已上名為出世是二之中各有證行阿含行異故有四句一切世間安隱快樂者是三地還證行體也證行寂滅名為安隱證法適神稱曰快樂一切世間如意自在者是三地還阿含行也謂八禪等及出世間安樂劫成者是四地上證行體也法從喻稱故曰劫成乃至天人本所未得者是四地上阿含行也謂道品等三地已還阿含之行是凡夫法人天共得四地已上阿含之行是聖人法人天不得故名天人本所未得此等皆從攝受中出第三喻中先喻後合喻中如地喻攝受體持四擔下喻攝受能持四總也何等下列先問後列大海最重喻於凡夫諸山次輕喻於聲聞草木轉輕喻於緣覺眾生最輕喻於菩薩下次合之攝受正法男子女人建立大地者合前地男子女人修成攝受名建大地良以化用必在人故就人彰地堪能已下合攝受能先合前總却合後別堪荷四任喻彼大地合前總也堪荷四任約喻顯法如前大地堪持四擔彼大地辨法過喻地雖能持無心荷擔菩薩大悲心有荷負是故言踰踰猶過也何等四下合前別也先廣向前能荷四任後廣前踰彼大地廣能荷中初問次列後總結之何等四下列其名也謂離知識無聞眾生合前大海離善知識不近友也言無聞者不聞法也言非法者不能思惟如說行也以人天善而成熟者合前能持求聲聞者合前諸山授聲聞乘者合前能持求緣覺者合前草木授緣覺乘者合前能持求大乘者合前眾生授大乘者合前能持是名下結下廣踰義世尊如是攝受正法善男子女人建立大地堪能荷四任者牒前起後普為已下正顯義普為眾生作不請友大悲安愍眾生者就前無聞非法眾生以顯踰義凡夫不能求善知識名為不請菩薩大悲強為作友名不請友大悲安慰哀愍眾生解釋不請為友所以以悲安慰哀愍眾生故不請為世法就前聲聞緣覺菩薩以顯喻義三乘法身從彼攝受正法人生故名彼人為世法母第四喻中先喻後合喻中大地喻攝受體有四寶藏下喻彼攝受苞含之義於中初總次別後結有四是總何等下是別別中初問後列其名結文可知合中如是攝受正法男子女人建立大地者合前大地得眾生下合有四寶得眾生四種最上大寶合前總也菩薩自得己家四法兵何名為生四寶釋言此四是化他法故名眾生四種大寶何等已下合前別也合中還復似前喻之初問後列攝受正法男子女人者舉得法人無聞已下舉其與他以顯自得無聞眾以人天善根而授與之者合有下價求聲聞者授聲聞乘者合有中價求緣覺乘者合有上價求大乘者授以大乘合有無價下合結文句別有二得寶眾生皆由攝受法男子女人是第一句結化歸本法從喻稱名為大寶良由攝法男子女人自具四法能令他得故他所得皆由攝法男子女人自得歟奇特希有德也此四皆是攝受中法非世所有故名曰奇特希有德也此四皆是攝受中攝受正法是第二句結用歸體法從喻稱名大法藏如大地中所有四藏體即是地攝受之中所有四法即是攝受是攝受故攝受無量自下第二外化出生廣上八萬四千法門隨別細分便有八萬四千法門據要統攝其唯六度故下明之於中文二一明自下攝受正法二從無異波羅蜜下以己自行即於外化問曰是中為明外化何不一旦論先說自行後即化他釋言是中為彰攝受出之義故先明其之自行攝受後即外化彰彼外化亦從自行攝受中出前自行中特行對治互以相即何故須爾為明菩薩即法之行外化眾生外化之行亦即法故於中初言攝受正法總以標舉攝受法者重復牒來下就辨即無異法者行不異法無異攝受法不異行正法即是攝受法者結明無異以即是故名為無異非曰相似問曰行法理法應是別今云何言法即攝受釋言若是緣修對治心境不泯行與法異攝受真德心境同體隨義分二故得相即是義云何攝受即是真如之心正法即是真如之理即心體如名之為理即如真照說以為心以心攝理名為攝受理為心攝證說為正法豈得條異就下自行即外化中先以攝受即波羅蜜何以故下問答辨釋前中無異波羅蜜者明其自行不異外化攝受正法是其自行六波羅蜜是其外化用已攝受隨緣化他為波羅蜜故攝受無異波羅蜜也道口言無異攝受法者明波羅蜜不異攝受化他所行與實相右即名攝受故波羅蜜不異攝受攝受即是波羅蜜者結明無異非曰相似問曰餘處皆以六度為自利行今此何故說為外化釋言所對不同故爾餘對四攝故為自行此對攝受內證之德六波羅蜜緣中造修可以共化故為外問曰若此是外化者四攝法中何行所收釋言此是同行所攝自行六度勸化行故下廣釋之於中先問次釋後結何故問也攝受正法與六波羅蜜應即別異何故言即下對釋之釋意如何正明菩薩用自攝受隨緣化他即說以為波羅蜜行故攝受與波羅蜜行體性不異亦如有人以檀攝他即說以為布施攝故布施攝行共檀不異此亦如是是中應先廣解六度體然後釋文六度之義廣如別章文中初言攝受正法男子女人舉攝定人下明此人用己攝受外化眾生為波羅蜜六中一一各有三句一標所化二明菩薩同行攝取三結已化行為波羅蜜應施成者檀中初句慳貪眾生宜教行施名施成就以施成下明同行攝句有總別以施成就者是其總也餘是別也別中三句一明菩薩自行布施二將護下以施攝佗三彼所下明所化生因化德立檀有此三諸度亦爾初中乃至捨身等者乃至是其窮到之辭施有內外捨身名內於餘是外外易內難從外至內故曰乃至捨身支節第二句中將護彼意者化他始也為教行施善順其心名護彼意而成就者化他成也第三句中彼所成就眾生建立法者行施得實名建正法上來菩薩同行攝取是名下結此結菩薩自身行所行為波羅蜜不結眾生所建正法以自所行名波羅蜜故與攝受同體不異下餘類爾就尸羅中應以戒成標別所化毀禁眾生應以戒成下明菩薩同行攝取捨中還初明其自行次明攝化後明眾生因化德立前自行中有始有終守護六根者是其始也從眼至意是其六根此六如門能通六塵損壞戒善故須防護防護之行唯念與慧念心守境慧善分別淨身口意下戒行成就成中有二一是正戒遠離性罪二正威儀遠離遮過淨身口意是其正戒離性罪也乃至已下是正威儀離遮過也乃至還是窮到之辭性罪為離遮過難防從離性罪終到遮過故曰乃至行住坐臥是四威儀將護彼下釋不異前是名下結就羼提中應忍成者標別所化嗔恚眾生應以忍熟下明菩薩同行攝取於中亦先明其自行次明化他德後明眾生因化德立前自行中有始有終從初乃至饒益心來是其始也餘是終也始中若彼罵詈毀等是其辱事罵詈毀辱誹謗是口辱也當惡而論名為詈罵過惡而噵稱曰毀辱全無忌造說為誹謗言恐毀者是身辱也打縛割截禁戒等事說為恐怖以無恚心饒益心者對辱修忍以無恚心者明離嗔過饒益心者明攝對治有心益彼焉有加損下明忍成成中有二一離加報二離微變第一忍力離加彰也對前始修說此終成以為第一乃至已下離㣲變也乃至還是窮到之辭從離及報終至無變故曰乃至將護已下義同前釋就精進中應精進成標別所化懈怠眾生應精進成下明菩薩同行攝取還初自行次明化他後明眾生因化德立前自行中有始有終初至生欲是其始也菩薩精進為攝眾生是故說於彼眾生不起懈心明其離過如經中說懶墮是進之鄣懈怠是其精進之垢鄣重垢輕今說離輕明重亦無生大欲心是攝治也於諸善法皆有修意名大欲心欲心是其精進方便故先生之第一已下就以為第一乃至已下是身精進乃至還是窮到之辭心易身難從心至身故曰乃至捨身相中行住坐臥常能懃苦名苦四威儀矣將護已下義同前釋就禪定中應以禪成標別所化亂心眾生應以禪成下明菩薩同行攝取還初自行次明化他後明眾生因化德立前自行中有始有終從初乃至不外向心是始修也為他起行是故說言捨彼眾生以不亂心事定始也攝心一緣名不亂心不外向心理定始也安心實際離妄分別名不外向第一已下自行終成成有兩句一定體不動二化用不動第一正念者體不動也對前始終名此終成以為第一乃至已下用不動也乃至還是窮到之辭從體不動至用不動故曰乃至久時所作者是身用也久時所說是口用也菩薩定深用百變不起諸禪故言不失將護已下義同前釋就波若中應以慧成標別所化愚癡眾生應以慧成次明菩薩同行攝取文有總別問一切義無畏演說是其總也彼問一切五明等義菩薩捨此窮證決了故得無畏而為演說一切論下是其別也於中還初明其自行次明化他後明眾生因化德立自中初言一切論等是其所知五明處中內因聲醫是一切論世工業處名一切巧通則此五皆名為論各是明處捨中分別前之四種假文處多說之為論第五一門隨事倣習直云工巧今依後義究竟以下是其能知究竟明處總明能知一切論等是其菩薩生智明處故名明處此五明處義通相實相為世諦實為真諦菩薩窮知故曰究竟故地持云五明處具足一切聞思脩證名知論乃至已下別明能知乃至還是窮到之辭從知內論乃至第五工巧諸事故曰乃至下化他中將護化始成就化終彼所成下明所化生因化德立亦可前言問義為說出世法化一切論下世間法化是名下結還結菩薩自己所行為波羅蜜非結他上來廣釋是故已下第三總結言是故者是前菩薩用己攝受外化眾生為波羅蜜故不相異無異波羅攝受不異波羅蜜也無異攝受明波羅蜜不異攝受攝受即是簡去相似一行體上義分兩名非別相似故言即是自下第三得諸佛法廣前門中得一切法於中有三一承力欲說二佛許可三勝鬘正說我承佛威更說大義是初段也以此所說果德高勝故重承力果德高出名為大義佛言便說第二段也果德須陳故聽宣勝勝鬘白下第三段也捨中初明捨身命財又善男子善女人下廣明護法前中有二第一正明捨身命財得諸佛法二從如是於三分下嘆益勸循後護法中亦有此二至時當辨就前正明捨三分中初先以人共行相即何以故下問答辨釋是中為明捨三得三何不直論先以人行互相即乎為彰此人所得佛法不異攝受攝受中云故先明得法之人不異攝受文中初言攝受正法牒標前行攝受法者標舉其人無異攝受人不異行無異攝者行不異人攝受正法男子女人即是攝受結成無異問曰人行應是別矣云何言即釋言此人更無別人得攝受中常身命財以成人故不異攝受即人所得是攝受故不異捨人自下釋中先問後解何故問也人行兩殊何故不異下對釋之釋意云何正明此人捨三分已得攝受中常身命財以成人故不異攝受之中有三一總明此人為攝受故捨離三分二別三名三廣辨釋就初段中若攝正法男子女人為攝受故捨三分者地上菩薩為攝法男子女人本在地前欲入地時為得地上攝受法中常三分故捨離世間無常三分此人捨時既為攝受明知得時得攝受中常身命財以成己體得彼成體寧異攝受次列其名何等問也謂身命財正列其名次廣釋之男子女人舉捨得人捨身牒前生死後等出捨得處生死前際涅槃後際捨事不齊捨理如等要得此等方有捨得故名此等為捨得處離老病死明其所捨證法平等無法可除自然無之故名為得不壞下彰其所得所得有三一所得常二所得深三所得體從初乃至無有變易是其常也不壞常住明其遠離分段故常無生變易明其遠離變易故常不思功德是其深也平等法身妙出清分名不思議如來法身是其體也法報兩身過名法身此佛法身地上漸得捨命牒前生死後等出捨得處畢竟明其所捨是中捨命應當離生以何義故說言離死有為之生性是死法故言離死得無邊下彰其所得所得亦三一所得常二所得深三所得體得無邊常是其常也生死之命各有分限名之為邊常命異彼故言無邊無邊故常不思功德是其深也常命出情名不思議通達已下是其體也用慧為命故言通達一切所知廣也通達甚深所解深也功德無量何故偏說智慧為命惠為行主能持眾德如命能持色心之報故說為命是以經言慧命須菩提慧命舍利等捨財牒前生死後等出捨得處略無所捨得不共下明其所得所得有二一自報財二他供財自業所招淨土境界是自報財天人奉養是他供財初至具德是自報財捨中亦三一所得常二所得深三所得體從初乃至畢竟常住是其常也常財異世故云不共無盡無減顯不共相世間財物或盡或減菩薩所得不同彼財非全盡滅故言無盡非少缺減故言無減畢竟常住顯前無盡無減之相不可思議所得深也無皈業果非情所及名不思議是足功德者所得體也上來第一是自報財得一切生殊勝供者他供財上來第一正明捨三得諸佛法如是捨三下嘆益勸修如是捨三者是牒前也常為已下是嘆益也常為佛記自利益也得前三分定趣菩提故為佛記問曰前記得捨如來常身命財應是究竟云何今言為佛授記釋言所得雖是佛地上漸得故為佛記為生瞻仰外化益也自下廣明護佛法中先明護法入法朋者為佛記下嘆益勸修與前相似前中道理證法在己不失名護此相難明寄對破法不從以顯經言又者前說捨三今更明護故云又也男子女人攝受法者是護法人法欲滅下明護法時於中初言法欲滅時是壞法時如經中說釋迦正法有五百年度斯已後名法滅時比丘已下是壞法人比丘故語此方義翻乃有五種一名怖魔初出家時令魔怯怖此義據始二名乞士既出家已無所聚積乞求治三名淨命以法乞求離於邪命此二據次四名淨持戒既出家已釋持禁戒五名破惡以持戒故離犯戒過此二據終比丘尼者比丘如上尼者是其女之別稱優婆塞者此翻名為善宿男也懷善而居故云善宿優婆夷者此翻名為善宿女也此等在法而為乖反所以壞法朋黨已下是壞法相朋黨心壞諍訟口壞破壞離散是身壞也上來一段明護法時以不諂下明護法相於中六句前三異邪後三同正以不諂曲身不邪也形隨惡黨名為諂曲不欺誑口不邪也口宣邪法稱曰欺誑不幻偽者心不邪也心惑邪法名為幻偽下同正中愛樂正法是心正也攝受正法是口正也善言求法名為攝受入法朋中者是身正也亦可愛樂是入正心攝受正法是入正行入法朋中是入正人攝受法故入諸得法菩薩數中名入法朋上來護法自下嘆益入法朋者據後以牒必為諸佛之所授記者護法行成得佛決定故為佛記從上廣義即是無量說來至此大段第三勝鬘正說自下第四仰推如來我見攝受如是有大力牒己所解佛為實下仰推如來於中先明知見之德後明知見德中五句前四自德後一利他就自德中佛為實眼能見德也佛有五眼所謂肉眼天眼法眼慧眼佛眼五中佛眼見法審實故名實眼又見實性亦名實眼言實智者能知德也知法不虗故名實智智眼何別通釋是一隨義分別初眼名眼後知名智又證實性名為佛眼知諸法相說以為智為法根本者是前眼也佛眼見實諸法實性佛眼中得故名佛眼為法根本為通達法者是前智也謂通生死涅槃法相為依法者佛具眼智能以正法授與眾生正法依下明知見亦知見者亦前勝鬘勝鬘正說應將己亦佛何緣將佛而亦己乎亦義有其二種一以下亦上二以後亦前今此所論以後亦前所以無過佛有實智所以亦知佛有實眼所以亦見知見上來攝受正法廣大義矣上來第一勝鬘正說自下第二如來述讚於中有二一明如來內心隨喜於勝鬘說攝受正法大精進力者舉所喜事上來勝鬘廣明攝受出生自利出生利他及得佛法名精進力起隨喜者正生喜心二義故喜一以勝鬘所說契當故佛隨喜二以勝鬘仰推如來情無專執故佛隨喜二如是下發言述讚述讚有三一述讚勝鬘仰推之辭二如力士下述上所說自利利他及得佛法三我阿僧祇下述上初言攝受正法廣大之義乘言便故從後向前次第述之就初段中如是勝鬘總以述是以此如是告勝鬘知故言勝鬘如汝說下顯如是相如汝所說攝受正法其實是大精進力第二段中文別有三一隨別述成二是故下隨別結勸三如是下隨別結嘆前中三喻所謂力士牛王須彌四句釋之一喻相不同力士取其力強為喻牛王取其外好為喻須彌取其體精為喻二既法有異力士喻上自行出生牛王喻上外化出生須彌喻上得諸佛法三所對不同力士喻中對魔顯勝牛王喻中對二乘顯勝須彌喻中對彼地前近學顯勝四隨文辨釋力士喻中初喻次合後舉餘善對以顯勝喻中力士喻攝受體少觸身下喻攝受能此文是倒若正應言少身分觸生大苦痛力士以己少許身分觸人之時令人大苦喻彼攝受以少自行觸魔之時令魔大苦合中如是總以合之法同前喻故曰如是以此如是告語勝鬘故言勝鬘下別合之少攝受者合如力士少觸身分自利利他得佛法中偏舉自利是故言少令魔苦惱合生苦痛魔羅胡語此云殺者魔性姤弊常欲壞人一切善根故言殺者魔有四種一煩惱魔二者陰魔三者死魔四者天魔五住煩惱是煩惱魔五陰怨賊是其陰魔五陰離壞是其死魔第六天上別有魔天是天魔就內以論前三苦惱為道推破義以說為苦就外以論天魔苦惱得攝受者能降伏故我不見下舉餘善根對之顯勝謂不見凡夫二乘所有善根能令魔苦如此攝受牛王喻中初喻次合後略舉釋之喻中牛王喻攝受體形色無比喻外化勝勝一切牛寄對顯勝合中大乘合前牛王何故此中說為大乘外化是其大乘相故少攝受者合形無比三種德中偏論外化是故言少勝二乘者合前文中勝一切牛以廣大者略釋勝義化行廣大故勝二乘須彌喻中先喻次合後略釋之喻中須彌喻攝受體須稱胡語此云好高亦云安明高三百三十六萬里縱廣亦然六萬諸山以為眷屬於中獨出所以名王端嚴殊特者喻攝受中果德精勝此山具以四寶所成東有金西有白銀南有瑠北有頗梨是故此山端嚴殊特喻攝受者常身命財以成己體所以殊勝勝於眾山寄對顯勝合中大乘合須彌山果德高勝故曰大乘捨身命財以攝取心攝受正法合前喻中端嚴殊特捨身命財彰其所離以攝取心攝受正法明其所得以攝取心取證方便攝受正法是其正證以捨生死分身命財得攝受中常身命財以成己體故如須彌端嚴殊特勝不捨下合勝眾山地前菩薩不能捨離無常三分名不捨身命財始學大乘名為初生彼初住中所有諸行名不捨身命財初住大乘一切善根捨身命財攝受法者尚勝此善何況二乘以廣大故略釋勝義上來第一隨別述成次結勸言是故者是攝受中具足上來三種勝故當以此法開示教化建立眾生言開示者用前自利開眾生也言教化者用前利他化眾生也言建立者用前果德建立生也下次結嘆如是勝鬘是總結也下別結之如是大利結前自利如是大福結上利他如是大果結前第三得諸佛法從如力士至此第二述上所說自利利佗得諸佛法自下第三述上所說攝受正法廣大之義於中初先彰己說相述成勝鬘所說是大我阿僧祗劫說攝受法功德義利不得邊故故汝說攝受廣大之義正當道理是故下結是我所說不得邊故汝之所說攝受正法真實功德無量無邊無量者深也無邊者廣也正治二年六月二十日於東大寺本房以珍海已講本書寫了同七月二日以同本一校了年齡乃七旬雖病眼彌闇為興隆佛法乍苦惱書寫大師并三寶令知見宿趣生生奉值遇自他等利益三論宗沙門秀惠延德四壬子三月下旬令相傳之破損之間加修補了英憲
